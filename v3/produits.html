<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catalogue · Mikadodeco</title>
  <meta name="description" content="Le catalogue Mikadodeco : mobilier, luminaires et objets de design, choisis pièce par pièce." />
  <link rel="preconnect" href="https://use.typekit.net" />
  <link rel="preconnect" href="https://p.typekit.net" crossorigin />
  <!-- Hero resolution + preload. Runs BEFORE the stylesheets (so it is NOT
       gated by render-blocking CSS) and before the body <picture> exists. On
       a curated brand collection page it resolves the brand banner, else the
       generic catalog hero; stashes the choice on window.__hero and preloads
       the chosen WebP so the LCP fetch starts immediately, in parallel with
       the CSS. The body <picture> reuses the SAME srcset → the LCP image is
       fetched exactly once. -->
  <script>
    (function () {
      // handle → display name for brands shipping a header banner. Sources
      // MUST be ≥2400px wide, 3:1 (the markup hardcodes -1280/-1920/-2400.webp
      // + -1920.jpg — see scripts/optimize-images.js, which warns otherwise).
      // Drop the file, run `npm run images`, then add the handle here.
      // Kriptonite ships a file but isn't curated → intentionally absent.
      var HEADERS = {
        "fatboy": "Fatboy",
        "ferm-living": "Ferm Living",
        "tradition": "&Tradition",
        "vitra": "Vitra",
        "string-furniture": "String Furniture"
      };
      var m = location.pathname.match(/^\/collections\/([^\/?#]+)/);
      var h = m ? decodeURIComponent(m[1]).toLowerCase() : "";
      var hero;
      if (Object.prototype.hasOwnProperty.call(HEADERS, h)) {
        var d = "/images/brands/headers/";
        hero = {
          brand: true,
          srcset: d + h + "-1280.webp 1280w, " + d + h + "-1920.webp 1920w, " + d + h + "-2400.webp 2400w",
          img: d + h + "-1920.jpg",
          width: 2400, height: 800,
          alt: HEADERS[h],
          obj: "center 50%"
        };
      } else {
        hero = {
          brand: false,
          srcset: "/images/produits-hero-640.webp 640w, /images/produits-hero-960.webp 960w, /images/produits-hero-1280.webp 1280w, /images/produits-hero-1600.webp 1600w",
          img: "/images/produits-hero.jpg",
          width: 1600, height: 2000,
          alt: "Catalogue Mikadodeco",
          obj: "center 70%"
        };
      }
      window.__hero = hero;
      var link = document.createElement("link");
      link.rel = "preload";
      link.as = "image";
      link.type = "image/webp";
      link.setAttribute("imagesrcset", hero.srcset);
      link.setAttribute("imagesizes", "100vw");
      link.setAttribute("fetchpriority", "high");
      document.head.appendChild(link);
    })();
  </script>
  <link rel="stylesheet" href="https://use.typekit.net/gqc3ska.css" />
  <link rel="stylesheet" href="/styles.css" />
  <style>
    /* Promotions · discreet premium destination at the top of the catalog —
       a route into /collections/promotions, NOT a category filter chip
       (lives outside [data-chips] so it survives the curated-view hide). */
    .plp-promo { margin: 18px 0 4px; }
    .plp-promo__link {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      font-family: var(--sans-product);
      font-size: var(--fs-meta);
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent-ink);
      padding-bottom: 3px;
      border-bottom: 1px solid transparent;
      transition: color .18s var(--ease), border-color .18s var(--ease);
    }
    .plp-promo__link:hover,
    .plp-promo__link:focus-visible { border-bottom-color: var(--accent-ink); outline: none; }
    .plp-promo__dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
      flex: none;
    }
  </style>
</head>
<body>
  <div id="site-header"></div>

  <section class="subhero">
    <!-- Hero <picture>, rendered from the choice resolved in <head>
         (window.__hero). Its <source> srcset matches the head preload, so the
         LCP image — already fetching in parallel with the CSS — is fetched
         exactly once. The .subhero box is a fixed height in CSS, so the image
         is never the layout driver (zero CLS). On a brand banner, onerror
         drops the WebP <source> and swaps to the generic hero — a brand page
         never shows a broken image. JS-less clients use the <noscript> hero. -->
    <script>
      (function () {
        var hero = window.__hero || {
          brand: false,
          srcset: "/images/produits-hero-640.webp 640w, /images/produits-hero-960.webp 960w, /images/produits-hero-1280.webp 1280w, /images/produits-hero-1600.webp 1600w",
          img: "/images/produits-hero.jpg", width: 1600, height: 2000,
          alt: "Catalogue Mikadodeco", obj: "center 70%"
        };
        var enc = function (s) { return String(s).replace(/&/g, "&amp;").replace(/"/g, "&quot;"); };
        var onerr = hero.brand
          ? ' onerror="this.onerror=null;var s=this.parentNode.querySelector(\'source\');if(s)s.remove();' +
            'this.src=\'/images/produits-hero.jpg\';this.style.objectPosition=\'center 70%\'"'
          : '';
        document.write(
          '<picture>' +
            '<source type="image/webp" srcset="' + hero.srcset + '" sizes="100vw">' +
            '<img class="subhero__img" src="' + hero.img + '" width="' + hero.width + '" height="' + hero.height + '" ' +
              'alt="' + enc(hero.alt) + '" fetchpriority="high" style="object-position:' + hero.obj + '"' + onerr + '>' +
          '</picture>'
        );
      })();
    </script>
    <noscript>
      <picture>
        <source type="image/webp"
          srcset="/images/produits-hero-640.webp 640w, /images/produits-hero-960.webp 960w, /images/produits-hero-1280.webp 1280w, /images/produits-hero-1600.webp 1600w"
          sizes="100vw" />
        <img class="subhero__img" src="/images/produits-hero.jpg" width="1600" height="2000" alt="Catalogue Mikadodeco" fetchpriority="high" style="object-position: center 70%" />
      </picture>
    </noscript>
    <div class="subhero__scrim"></div>
    <div class="subhero__in">
      <h1 data-plp-title>Le catalogue</h1>
      <p data-plp-sub>Mobilier, luminaires et objets, choisis pièce par pièce.</p>
    </div>
  </section>

  <div class="wrap" data-breadcrumb></div>

  <div class="wrap plp-promo">
    <a class="plp-promo__link" href="/collections/promotions">
      <span class="plp-promo__dot" aria-hidden="true"></span>Promotions
    </a>
  </div>

  <div class="filterbar" data-chips>
    <div class="chips">
      <button class="chip" data-cat="tous">Tous</button>
      <button class="chip" data-cat="assises">Assises</button>
      <button class="chip" data-cat="tables">Tables</button>
      <button class="chip" data-cat="luminaires">Luminaires</button>
      <button class="chip" data-cat="rangements">Rangements</button>
      <button class="chip" data-cat="objets">Objets</button>
    </div>
    <select class="chips-select" data-chips-select aria-label="Filtrer par catégorie">
      <option value="tous">Tous</option>
      <option value="assises">Assises</option>
      <option value="tables">Tables</option>
      <option value="luminaires">Luminaires</option>
      <option value="rangements">Rangements</option>
      <option value="objets">Objets</option>
    </select>
    <div class="filterbar__right">
      <span class="plp-count" data-plp-count></span>
      <select class="fselect" data-filter-brand aria-label="Marque"><option value="">Toutes les marques</option></select>
      <select class="fselect" data-sort aria-label="Trier">
        <option value="pop">Les plus populaires</option>
        <option value="asc">Prix croissant</option>
        <option value="desc">Prix décroissant</option>
        <option value="az">A → Z</option>
      </select>
    </div>
  </div>

  <div class="wrap" data-promo-slot></div>

  <section class="section wrap" data-pop-section style="padding-bottom:0">
    <h2 class="serif catalogue-head">Les plus populaires</h2>
    <div class="pgrid" data-pop-grid>
      <div class="pcard"><div class="pcard__skel"></div></div>
      <div class="pcard"><div class="pcard__skel"></div></div>
      <div class="pcard"><div class="pcard__skel"></div></div>
      <div class="pcard"><div class="pcard__skel"></div></div>
    </div>
  </section>

  <section class="section wrap">
    <h2 class="serif catalogue-head" data-grid-title>Tout le catalogue</h2>
    <div class="pgrid" data-grid></div>
    <div class="loadmore-wrap" data-loadmore-wrap style="display:none">
      <button class="btn btn--outline" data-loadmore>Voir plus</button>
    </div>
  </section>

  <div id="site-footer"></div>

  <script type="module">
    import { initShell, fetchProducts, fetchBrands, fetchCollections, fetchPromos, applyPromos, productCard, slugify, escapeHtml, isPromoEteActive, promoBandeauHTML, breadcrumbHTML, PROMO_ETE_2026 } from "/shared.js";
    initShell({ active: "Mobilier", transparentNav: true });

    const CAT_LABEL = { tous:"Le catalogue", assises:"Assises", tables:"Tables", luminaires:"Luminaires", rangements:"Rangements", objets:"Objets", exterieur:"Extérieur" };

    // Hardcoded handle → title map for the collections exposed in the
    // mega menu. Used for instant title paint before the
    // /api/collection/<handle>/products fetch resolves — avoids the
    // "Le catalogue" flash. The Shopify payload still overrides this
    // silently once it arrives (lets Cyril rename in admin).
    const COLL_TITLES = {
      // Mobilier > Sièges
      "sieges": "Sièges",
      "chaises": "Chaises",
      "fauteuils": "Fauteuils",
      "canapes": "Canapés",
      "sieges-de-bureau": "Sièges de bureau",
      "chaises-longues": "Chaises longues",
      "tabourets-et-bancs": "Tabourets et bancs",
      // Mobilier > Tables
      "tables": "Tables",
      "tables-de-salle-a-manger": "Tables de salle à manger",
      "tables-de-cafe": "Tables de café",
      "tables-basses-et-tables-dappoint": "Tables basses et tables d'appoint",
      "bureaux": "Bureaux",
      // Mobilier > Luminaires
      "luminaires": "Luminaires",
      "suspensions": "Suspensions",
      "lampes-de-table": "Lampes de table",
      "lampes-de-bureau": "Lampes de bureau",
      "lampadaires": "Lampadaires",
      "appliques": "Appliques",
      "lampes-nomades": "Lampes nomades",
      // Mobilier > Décoration
      "decoration": "Décoration",
      "vases": "Vases",
      "bougeoirs-bougies-photophores": "Bougeoirs, bougies & photophores",
      "miroirs": "Miroirs",
      "coussins-plaids-tapis": "Coussins, plaids & tapis",
      "cache-pots-jardinieres": "Cache-pots & jardinières",
      "objets-decoratifs-cadres": "Objets décoratifs & cadres",
      // Mobilier > Outdoor
      "outdoor": "Mobilier outdoor",
      "chaises-outdoor": "Chaises outdoor",
      "tables-outdoor": "Tables outdoor",
      "bancs-outdoor": "Bancs outdoor",
      "bains-de-soleil-transats": "Bains de soleil & transats",
      "parasols-ombrages": "Parasols & ombrages",
      "brasero-barbecue": "Brasero & barbecue",
      "accessoires-jardin": "Accessoires jardin",
      // Mobilier > Rangement
      "rangement": "Rangement",
      "etageres-et-bibliotheques": "Étagères et bibliothèques",
      "commodes-et-buffets": "Commodes et buffets",
      "paniers-et-corbeilles": "Paniers et corbeilles",
      "pateres-et-porte-manteaux": "Patères et porte-manteaux",
      "dessertes-et-chariots": "Dessertes et chariots",
      // Mobilier > Arts de la table
      "accessoires": "Arts de la table",
      "vaisselle-assiettes": "Vaisselle & assiettes",
      "verres-carafes": "Verres & carafes",
      "couverts": "Couverts",
      "mugs-tasses-cafe": "Mugs, tasses & café",
      "ustensiles-cuisine": "Ustensiles & cuisine",
      // Marques
      "vitra": "Vitra",
      "fermob": "Fermob",
      "tradition": "&Tradition",
      "hay": "HAY",
      "muuto": "Muuto",
      "ferm-living": "Ferm Living",
      "alessi": "Alessi",
      "iittala": "Iittala",
      "serax": "Serax",
      "marimekko": "Marimekko",
      "anglepoise": "Anglepoise",
      "artek": "Artek",
      "fatboy": "Fatboy",
      "hkliving": "HKliving",
      "pols-potten": "Pols Potten",
      // Promotions (also valid /collections/<handle> routes)
      "promotions": "Promotions",
      "promo-4eme-chaise-offerte": "Promo · 4ème chaise offerte",
    };

    // Brand handles — the "Marques" subset of COLL_TITLES. Drives the
    // breadcrumb level (Marques vs Mobilier) for a /collections/<handle> view.
    const BRAND_HANDLES = new Set([
      "vitra", "fermob", "tradition", "hay", "muuto", "ferm-living",
      "alessi", "iittala", "serax", "marimekko", "anglepoise", "artek",
      "fatboy", "hkliving", "pols-potten",
    ]);
    const grid = document.querySelector("[data-grid]");
    const popGrid = document.querySelector("[data-pop-grid]");
    const popSection = document.querySelector("[data-pop-section]");
    const countEl = document.querySelector("[data-plp-count]");
    const brandSel = document.querySelector("[data-filter-brand]");
    const sortSel = document.querySelector("[data-sort]");
    const chipsBar = document.querySelector("[data-chips]");
    const moreWrap = document.querySelector("[data-loadmore-wrap]");
    const titleEl = document.querySelector("[data-plp-title]");
    const subEl = document.querySelector("[data-plp-sub]");
    const gridTitle = document.querySelector("[data-grid-title]");
    const breadcrumbEl = document.querySelector("[data-breadcrumb]");

    const params = new URLSearchParams(location.search);
    // Pretty Shopify-style URL: /collections/<handle> sets the coll filter
    // from the path. Falls back to ?coll= for backward-compat with anywhere
    // we still build URLs that way.
    const prettyCollMatch = location.pathname.match(/^\/collections\/(.+?)\/?$/);
    const rawColl = prettyCollMatch ? decodeURIComponent(prettyCollMatch[1]) : (params.get("coll") || "");
    // "all" is the Shopify CATALOG-type item ("Mobilier" in the mega
    // menu) — there is no actual /collections/all on Storefront. Treat
    // it as no collection filter so we fall back to the paginated
    // catalog endpoint and keep the chips visible.
    const collFromPath = rawColl === "all" ? "" : rawColl;
    let ALL = [];
    let COLLECTIONS_BY_HANDLE = {};
    let COLLECTION_META = null; // set by /api/collection/:handle/products payload
    const PAGE_SIZE = 50;
    // V2: server-side pagination via cursor. state.cursor / state.hasMore
    // drive the "Voir plus" button; state.shown disappeared (we render
    // every product already loaded into ALL). Client filters (cat/brand/
    // tag/sort) still operate on the partial set — known V1 tradeoff.
    // V3 (chantier pages-designers-produits): ?designer=<slug> resolves
    // to a tag-OR list against /api/products?tags=... — the designer
    // metadata (name + tags) is fetched from /designers-data.json
    // before the first product fetch.
    const designerSlug = params.get("designer") || "";
    const state = { coll: collFromPath, cat: params.get("cat") || "tous", brand: params.get("brand") || "", tag: params.get("tag") || "", sort: "pop", cursor: null, hasMore: false, loading: false, designer: null };

    // Instant paint before the /api/collection/<handle>/products fetch
    // resolves. On ANY collection page: blank the description (V2.1 —
    // avoids the default "Mobilier de design…" flash) and hide chips.
    // Title is set from the hardcoded map when known (V1.1 — avoids
    // the "Le catalogue" flash). Both get silently overwritten by the
    // Shopify payload when it arrives.
    if (state.coll) {
      subEl.textContent = "";
      chipsBar.style.display = "none";
      if (COLL_TITLES[state.coll]) {
        titleEl.textContent = COLL_TITLES[state.coll];
      }
    }
    // Designer page: hide chips and blank the subtitle until the
    // designer record is resolved (loadInitial sets the real title).
    if (designerSlug) {
      subEl.textContent = "";
      chipsBar.style.display = "none";
    }

    const popScore = (p) => (p.featured ? 2 : 0) + (p.badge === "bestseller" ? 1 : 0);
    function base() {
      let list = ALL.slice();
      if (state.coll) list = list.filter((p) => Array.isArray(p.collections) && p.collections.includes(state.coll));
      if (state.cat !== "tous") list = list.filter((p) => p.category === state.cat);
      if (state.brand) list = list.filter((p) => slugify(p.brand) === state.brand);
      if (state.tag) list = list.filter((p) => Array.isArray(p.tags) && p.tags.includes(state.tag));
      return list;
    }
    function applySort(list) {
      const l = list.slice();
      if (state.sort === "asc") l.sort((a, b) => (a.price || 0) - (b.price || 0));
      else if (state.sort === "desc") l.sort((a, b) => (b.price || 0) - (a.price || 0));
      else if (state.sort === "az") l.sort((a, b) => String(a.name).localeCompare(String(b.name)));
      else l.sort((a, b) => popScore(b) - popScore(a)); // "pop"
      return l;
    }
    function syncURL() {
      const q = new URLSearchParams();
      // When the URL is already /collections/<handle>, don't echo coll in
      // the query string (it's in the path already).
      const collInPath = /^\/collections\//.test(location.pathname);
      if (state.coll && !collInPath) q.set("coll", state.coll);
      if (state.cat !== "tous") q.set("cat", state.cat);
      if (state.brand) q.set("brand", state.brand);
      if (state.tag) q.set("tag", state.tag);
      history.replaceState(null, "", location.pathname + (q.toString() ? "?" + q : ""));
    }
    function render() {
      const all = base();
      countEl.textContent = `${all.length} pièce${all.length > 1 ? "s" : ""}`;

      // Promo bandeau on outdoor entry pages — but NOT on the promo
      // collection itself (the page header already says everything when
      // the visitor lands there directly). Auto-removes after the window.
      const promoSlot = document.querySelector("[data-promo-slot]");
      if (promoSlot) {
        const onPromoPage = state.coll === PROMO_ETE_2026.collPromo
                         || state.tag === PROMO_ETE_2026.tagSiege;
        const showBandeau = isPromoEteActive() && !onPromoPage && (
          state.coll === PROMO_ETE_2026.collOutdoor ||
          state.cat === "exterieur" ||
          state.tag === PROMO_ETE_2026.tagOutdoor
        );
        promoSlot.innerHTML = showBandeau ? promoBandeauHTML("plp") : "";
      }

      // Always-on "most popular" strip (top 4), independent of the chosen sort.
      const showPop = all.length > 4;
      popSection.style.display = showPop ? "" : "none";
      const pop = showPop ? all.slice().sort((a, b) => popScore(b) - popScore(a)).slice(0, 4) : [];
      if (showPop) popGrid.innerHTML = pop.map(productCard).join("");

      const popIds = new Set(pop.map((p) => p.id));
      const mainList = applySort(all.filter((p) => !popIds.has(p.id)));
      // Designer pages get a dedicated empty message — "élargir les
      // filtres" doesn't apply when the URL itself selects the slice.
      const emptyMsg = state.designer
        ? `<p class="plp-empty">Aucun produit pour ce designer pour le moment. <a href="/designers.html" style="color:var(--accent-ink)">Retour aux designers →</a></p>`
        : `<p class="plp-empty">Aucune pièce ne correspond. Essayez d'élargir les filtres.</p>`;
      grid.innerHTML = mainList.length ? mainList.map(productCard).join("") : emptyMsg;
      // "Voir plus" reflects the server-side cursor — visible only when
      // there is another batch upstream. Client-side filters do NOT hide
      // it (a filter can match items in unfetched pages).
      moreWrap.style.display = state.hasMore ? "flex" : "none";
      gridTitle.textContent = showPop ? "Tout le catalogue" : "Le catalogue";

      chipsBar.querySelectorAll(".chip").forEach((c) => c.classList.toggle("is-active", c.dataset.cat === state.cat));
      // Keep the mobile <select> in sync with the active category so a
      // chip click from desktop or a URL reload both reflect on the
      // dropdown when the viewport drops below 769px.
      const selectEl = document.querySelector("[data-chips-select]");
      if (selectEl && selectEl.value !== state.cat) selectEl.value = state.cat;

      // Header + filterbar adapt to the active filter:
      //   ?coll  → collection title/description from Shopify (chips hidden)
      //   ?brand → brand name + standard subtitle
      //   ?tag   → readable label derived from the tag
      //   else   → default "Le catalogue"
      // Collection metadata: prefer the per-handle payload (always
       // current) over the global /api/collections cache (subset).
      const collFromMeta = COLLECTION_META && COLLECTION_META.handle === state.coll
        ? { name: COLLECTION_META.title, description: COLLECTION_META.description }
        : null;
      const coll = collFromMeta || (state.coll ? COLLECTIONS_BY_HANDLE[state.coll] : null);
      const brandName = state.brand ? (ALL.find((p) => slugify(p.brand) === state.brand)?.brand || "") : "";
      if (coll) {
        titleEl.textContent = coll.name;
        subEl.textContent = coll.description || "";
      } else if (state.designer?.name) {
        titleEl.textContent = `Produits de ${state.designer.name}`;
        subEl.textContent = `Sélection de pièces designées par ${state.designer.name}.`;
      } else if (state.designer && !state.designer.name) {
        titleEl.textContent = "Designer introuvable";
        subEl.textContent = "";
      } else if (brandName) {
        titleEl.textContent = brandName;
        subEl.textContent = "Toutes les pièces de la maison.";
      } else if (state.coll) {
        // Collection page — payload not (yet) available. Title from
        // the hardcoded map if known, else generic fallback.
        // Description stays empty until Shopify responds (V2.1).
        titleEl.textContent = COLL_TITLES[state.coll] || "Le catalogue";
        subEl.textContent = "";
      } else if (state.tag === PROMO_ETE_2026.tagSiege) {
        titleEl.textContent = "Promo · 4ème chaise offerte";
        subEl.textContent = "Les sièges d'extérieur éligibles à l'offre du 26 mai au 6 juin.";
      } else {
        titleEl.textContent = CAT_LABEL[state.cat] || "Le catalogue";
        subEl.textContent = "Mobilier de design, choisi pièce par pièce.";
      }
      // Fil d'Ariane (Accueil › niveau › page courante), construit depuis le
      // mode résolu + le titre final ci-dessus. render() est rappelé à chaque
      // changement de filtre, donc le fil reste synchronisé.
      if (breadcrumbEl) {
        const home = { label: "Accueil", href: "/" };
        const cur = { label: titleEl.textContent };
        let trail;
        if (state.coll) {
          const lvl = BRAND_HANDLES.has(state.coll)
            ? { label: "Marques", href: "/marques.html" }
            : { label: "Mobilier", href: "/produits.html" };
          trail = [home, lvl, cur];
        } else if (state.designer) {
          trail = [home, { label: "Designers", href: "/designers.html" },
                   { label: state.designer.name || "Designer introuvable" }];
        } else if (brandName) {
          trail = [home, { label: "Marques", href: "/marques.html" }, cur];
        } else if ((state.cat && state.cat !== "tous") || state.tag) {
          trail = [home, { label: "Mobilier", href: "/produits.html" }, cur];
        } else {
          trail = [home, cur];
        }
        breadcrumbEl.innerHTML = breadcrumbHTML(trail);
      }
      // Hide categorical chips when we're inside a curated view (collection
      // or tag) — they don't make sense and dilute the page identity.
      chipsBar.style.display = (state.coll || state.tag || state.designer) ? "none" : "";

      applyPromos(PROMOS);
    }

    let PROMOS = {};

    // Build the endpoint URL for the active route + cursor. Any
    // collection filter (from /collections/<handle> path or ?coll=
    // legacy query) hits the dedicated server-side endpoint;
    // /produits.html without filter hits /api/products?paginated=1.
    // V2.1: `state.tag` is forwarded to the server when on a
    // collection — Shopify ProductFilter narrows the result set
    // upstream instead of the client filtering a partial batch.
    function endpointFor(cursor) {
      const q = new URLSearchParams({ limit: String(PAGE_SIZE) });
      if (cursor) q.set("cursor", cursor);
      if (state.coll) {
        if (state.tag) q.set("tag", state.tag);
        return `/api/collection/${encodeURIComponent(state.coll)}/products?${q}`;
      }
      // V3 designer route: OR-tag query against /api/products. Tags are
      // resolved from /designers-data.json so a single ?designer=<slug>
      // can capture multiple historical tag variants (e.g. bouroullec,
      // ronan-bouroullec, erwan-bouroullec for the duo). Unknown slugs
      // get a sentinel tag that matches nothing, so the grid stays
      // empty and the "introuvable" header is the only message.
      if (state.designer) {
        q.set("paginated", "1");
        q.set("tags", state.designer.tags?.length
          ? state.designer.tags.join(",")
          : "__no_designer_match__");
        return `/api/products?${q}`;
      }
      q.set("paginated", "1");
      return `/api/products?${q}`;
    }

    async function fetchPage(cursor) {
      const r = await fetch(endpointFor(cursor));
      if (r.status === 404) return { _notFound: true };
      if (!r.ok) throw new Error("HTTP " + r.status);
      return r.json();
    }

    // Resolve ?designer=<slug> to { slug, name, tags } before the first
     // product fetch. If the slug isn't in designers-data.json we keep
     // state.designer = null + show a friendly empty state.
    async function resolveDesigner() {
      if (!designerSlug) return;
      try {
        const r = await fetch("/designers-data.json", { cache: "force-cache" });
        if (!r.ok) return;
        const data = await r.json();
        const d = (data.designers || []).find((x) => x.slug === designerSlug);
        if (d) {
          state.designer = { slug: d.slug, name: d.name, tags: (d.tags && d.tags.length) ? d.tags : [d.slug] };
        } else {
          // Slug not found → flag with a name=null sentinel so render()
          // can switch to "Aucun produit pour ce designer".
          state.designer = { slug: designerSlug, name: null, tags: [] };
        }
      } catch (e) {
        console.warn("[plp] designers-data unavailable:", e.message);
      }
    }

    async function loadInitial() {
      try {
        await resolveDesigner();
        const [pageData, brands, colls] = await Promise.all([
          fetchPage(null),
          fetchBrands(),
          fetchCollections(),
        ]);
        (colls || []).forEach((c) => { if (c.handle) COLLECTIONS_BY_HANDLE[c.handle] = c; });
        brands.sort((a, b) => String(a.name).localeCompare(String(b.name))).forEach((b) => {
          const o = document.createElement("option");
          o.value = slugify(b.name); o.textContent = `${b.name} (${b.productCount})`;
          if (o.value === state.brand) o.selected = true;
          brandSel.appendChild(o);
        });
        sortSel.value = state.sort;

        if (pageData._notFound) {
          titleEl.textContent = "Collection introuvable";
          subEl.textContent = "";
          grid.innerHTML = `<p class="plp-empty">Cette collection n'existe pas ou plus. <a href="/marques.html" style="color:var(--accent-ink)">Voir toutes les marques →</a></p>`;
          moreWrap.style.display = "none";
          popSection.style.display = "none";
          chipsBar.style.display = "none";
          countEl.textContent = "";
          return;
        }
        if (pageData.collection) COLLECTION_META = pageData.collection;
        ALL = (pageData.items || []).filter((p) => p.image);
        state.cursor  = pageData.pageInfo?.endCursor || null;
        state.hasMore = !!pageData.pageInfo?.hasNextPage;
        render();
      } catch (e) {
        grid.innerHTML = `<p class="plp-empty">Le catalogue se charge bientôt.</p>`;
        console.warn(e);
      }
    }

    async function loadMore() {
      if (!state.hasMore || state.loading) return;
      state.loading = true;
      const btn = document.querySelector("[data-loadmore]");
      const label = btn?.textContent;
      if (btn) { btn.textContent = "…"; btn.disabled = true; }
      try {
        const data = await fetchPage(state.cursor);
        if (data?.items?.length) {
          ALL = ALL.concat(data.items.filter((p) => p.image));
        }
        state.cursor  = data?.pageInfo?.endCursor || null;
        state.hasMore = !!data?.pageInfo?.hasNextPage;
        render();
      } catch (e) {
        console.warn("loadMore:", e.message);
      } finally {
        state.loading = false;
        if (btn) { btn.textContent = label || "Voir plus"; btn.disabled = false; }
      }
    }

    loadInitial();

    // Background promo fetch — re-applies to the current grid (and to every
    // subsequent render via the applyPromos call inside render()).
    fetchPromos().then((map) => { PROMOS = map; applyPromos(PROMOS); })
      .catch((e) => console.warn("[v3] promos unavailable:", e.message));

    chipsBar.addEventListener("click", (e) => {
      const c = e.target.closest(".chip"); if (!c) return;
      state.cat = c.dataset.cat; syncURL(); render();
    });
    // Mobile dropdown (visible ≤ 768px) shares the same state.cat.
    const chipsSelectEl = document.querySelector("[data-chips-select]");
    if (chipsSelectEl) {
      chipsSelectEl.addEventListener("change", (e) => {
        state.cat = e.target.value; syncURL(); render();
      });
    }
    brandSel.addEventListener("change", () => { state.brand = brandSel.value; syncURL(); render(); });
    sortSel.addEventListener("change", () => { state.sort = sortSel.value; render(); });
    document.querySelector("[data-loadmore]").addEventListener("click", loadMore);
  </script>
</body>
</html>
