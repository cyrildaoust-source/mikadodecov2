<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Designers · Mikadodeco</title>
  <meta name="description" content="Les créateurs qui façonnent les collections que nous revendons." />
  <link rel="preconnect" href="https://use.typekit.net" />
  <link rel="preconnect" href="https://p.typekit.net" crossorigin />
  <link rel="stylesheet" href="https://use.typekit.net/gqc3ska.css" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div id="site-header"></div>

  <section class="subhero">
    <picture>
      <source type="image/webp"
        srcset="/images/marques-hero-640.webp 640w, /images/marques-hero-960.webp 960w, /images/marques-hero-1280.webp 1280w, /images/marques-hero-1500.webp 1500w"
        sizes="100vw" />
      <img class="subhero__img" src="/images/marques-hero.jpg" width="1500" height="1875" alt="Designers Mikadodeco" fetchpriority="high" />
    </picture>
    <div class="subhero__scrim"></div>
    <div class="subhero__in">
      <h1>Designers.</h1>
      <p>Les créateurs qui façonnent les collections que nous revendons.</p>
    </div>
  </section>

  <section class="section wrap reveal">
    <div class="shead"><h2 class="serif">Tous les designers</h2><span class="plp-count" data-designer-count></span></div>
    <div class="designer-grid" data-designer-grid></div>
    <script>
      /* Reserve grid height before /designers-data.json comes back —
         53 skeletons matching the real (épuré) card shape (photo 4:5 +
         name + brands, no bio). Replaced by the rendered cards in the
         module below. Without this, the grid is 0px tall at first paint
         and the footer jumps thousands of px when cards inject (CLS). */
      (function () {
        var g = document.querySelector("[data-designer-grid]");
        if (!g) return;
        var skel = '<div class="designer-card designer-card--skel">'
                 + '<div class="designer-card__skel-photo"></div>'
                 + '<div class="designer-card__skel-name"></div>'
                 + '<div class="designer-card__skel-brand"></div>'
                 + "</div>";
        g.innerHTML = skel.repeat(53);
      })();
    </script>
  </section>

  <div id="site-footer"></div>

  <script type="module">
    import { initShell, escapeHtml } from "/shared.js";
    initShell({ active: "Marques", transparentNav: true });

    const grid    = document.querySelector("[data-designer-grid]");
    const countEl = document.querySelector("[data-designer-count]");

    fetch("/designers-data.json", { cache: "force-cache" })
      .then((r) => r.ok ? r.json() : Promise.reject("designers-data " + r.status))
      .then((data) => {
        const list = data?.designers || [];
        // Robust last-name sort (the JSON ships pre-sorted; this secures it).
        list.sort((a, b) => (a.sortKey || a.name).localeCompare(b.sortKey || b.name, "fr", { sensitivity: "base" }));
        countEl.textContent = `${list.length} designers`;
        grid.innerHTML = list.map((d) => {
          // Card layout: <article> wrapper + transparent overlay <a> for
          // navigation (covers the whole card). Brand links sit above the
          // overlay via z-index so they stay clickable on their own. This
          // pattern avoids Safari's "<a> as a flex container" bug that
          // visually dissociated photo / name / bio across cards.
          const brands = (d.brands || []).map((b, i) => {
            const href = d.brandHrefs?.[i];
            return href
              ? `<a href="${escapeHtml(href)}">${escapeHtml(b)}</a>`
              : `<span>${escapeHtml(b)}</span>`;
          }).join("<span class=\"designer-card__brand-sep\" aria-hidden=\"true\"> · </span>");
          return `
            <article class="designer-card" id="${escapeHtml(d.slug)}">
              <picture><source type="image/webp" srcset="${escapeHtml(d.photo.replace(/\.jpg$/, "-640.webp"))}" /><img class="designer-card__photo" src="${escapeHtml(d.photo)}" width="640" height="800" alt="${escapeHtml(d.name)}" loading="lazy" /></picture>
              <h3 class="designer-card__name">${escapeHtml(d.name)}</h3>
              <div class="designer-card__brands">${brands}</div>
              <a class="designer-card__link" href="/produits.html?designer=${encodeURIComponent(d.slug)}" aria-label="Voir les produits de ${escapeHtml(d.name)}"></a>
            </article>`;
        }).join("");

        // Deep-link: scroll to the targeted card and pulse it briefly.
        // Slight delay lets the layout settle before we measure offsets.
        const hash = location.hash.replace(/^#/, "");
        if (hash) {
          requestAnimationFrame(() => {
            const card = document.getElementById(hash);
            if (!card) return;
            card.scrollIntoView({ behavior: "smooth", block: "start" });
            card.classList.add("is-highlight");
            setTimeout(() => card.classList.remove("is-highlight"), 1600);
          });
        }
      })
      .catch((e) => {
        grid.innerHTML = `<p class="plp-empty">La page designers se charge bientôt.</p>`;
        console.warn("[designers]", e);
      });

    // Hash changes (e.g. back-button from elsewhere on the same page)
    window.addEventListener("hashchange", () => {
      const h = location.hash.replace(/^#/, "");
      const card = h && document.getElementById(h);
      if (card) {
        card.scrollIntoView({ behavior: "smooth", block: "start" });
        card.classList.add("is-highlight");
        setTimeout(() => card.classList.remove("is-highlight"), 1600);
      }
    });
  </script>
</body>
</html>
