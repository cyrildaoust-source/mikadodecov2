<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="/favicon.ico" sizes="32x32" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <title>Nuancier Fermob · Mikadodeco</title>
  <meta name="description" content="Le nuancier complet Fermob 2026 — 25 nuances signature, leurs ambiances, leurs harmonies." />
  <link rel="preconnect" href="https://www.fermob.com" />
  <link rel="preconnect" href="https://use.typekit.net" />
  <link rel="preconnect" href="https://p.typekit.net" crossorigin />
  <link rel="stylesheet" href="https://use.typekit.net/gqc3ska.css" media="print" onload="this.media='all'" />
  <noscript><link rel="stylesheet" href="https://use.typekit.net/gqc3ska.css" /></noscript>
  <link rel="stylesheet" href="/styles.css" />
  <link rel="stylesheet" href="/nuancier-fermob.css" />
</head>
<body>
  <div id="site-header"></div>

  <main class="page wrap">
    <div id="nf-root"></div>
  </main>

  <section class="section wrap reveal" style="text-align:center">
    <h2 class="serif" style="font-size:clamp(26px,2.6vw,38px);margin-bottom:18px">Envie d'aller plus loin ?</h2>
    <p style="color:var(--muted);margin-bottom:22px">Le guide couleur complet, ou les pièces Fermob disponibles.</p>
    <a href="/article.html?slug=comment-choisir-couleur-fermob" class="btn btn--outline">Lire le guide couleur</a>
    <a href="/collections/fermob" class="btn btn--blue" style="margin-left:10px">Voir les pièces Fermob</a>
  </section>

  <div id="site-footer"></div>

  <script type="module">
    import { initShell } from "/shared.js";
    import { mountNuancier } from "/nuancier-fermob.js";

    initShell({ active: "Le journal", transparentNav: false });

    (async () => {
      try {
        const r = await fetch("/nuancier-fermob.data.json", { cache: "no-cache" });
        if (!r.ok) throw new Error("HTTP " + r.status);
        const colors = await r.json();
        // Standalone page: skip scroll-on-load (host is already near top).
        mountNuancier(document.getElementById("nf-root"), colors, { scrollOnLoad: false });
      } catch (err) {
        console.warn("[nuancier] load failed:", err.message);
        document.getElementById("nf-root").innerHTML =
          `<p class="nf-error">Le nuancier ne s'est pas chargé. <a href="/journal.html">Retour au journal →</a></p>`;
      }
    })();
  </script>
</body>
</html>
