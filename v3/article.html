<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Redirection · Mikadodeco</title>
  <!-- Stub de compatibilité : les articles sont désormais des pages statiques
       /journal/<slug>.html (pré-rendues, SEO complet). On redirige les anciens
       liens ?slug= (la 301 propre est faite côté Vercel — cf. vercel.json — ;
       ce JS est le filet de sécurité pour les liens déjà partagés). -->
  <script>
    (function () {
      var slug = new URLSearchParams(location.search).get("slug");
      location.replace(slug ? "/journal/" + encodeURIComponent(slug) + ".html" : "/journal.html");
    })();
  </script>
  <noscript><meta http-equiv="refresh" content="0; url=/journal.html" /></noscript>
</head>
<body>
  <p>Cet article a déménagé. <a href="/journal.html">Aller au journal</a>.</p>
</body>
</html>
