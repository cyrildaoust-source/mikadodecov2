  <meta name="twitter:description" content="Découvrez cette pièce de notre sélection design. Retrait à Uccle, livraison en Belgique." />
  <meta name="twitter:image" content="https://www.mikadodeco.be/images/og-default.jpg" />
  <meta name="description" content="Découvrez cette pièce de notre sélection design. Retrait à Uccle, livraison en Belgique." />
  <script>
    /* SEO canonical — URL self propre (?handle). Toujours UN seul rel="canonical". */
    (function () {
      var handle = new URLSearchParams(location.search).get("handle");
      var canon = "https://www.mikadodeco.be/produit.html" + (handle ? "?handle=" + encodeURIComponent(handle) : "");
      var link = document.querySelector('link[rel="canonical"]') || document.head.appendChild(document.createElement("link"));
      link.rel = "canonical";
      link.href = canon;
    })();
  </script>
  <link rel="preconnect" href="https://use.typekit.net" />
  <link rel="preconnect" href="https://p.typekit.net" crossorigin />
  <link rel="stylesheet" href="https://use.typekit.net/gqc3ska.css" media="print" onload="this.media='all'" />
  <noscript><link rel="stylesheet" href="https://use.typekit.net/gqc3ska.css" /></noscript>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div id="site-header"></div>

  <main id="contenu" class="page wrap">
    <div data-breadcrumb></div>
    <div data-pdp>
      <div class="pdp"><div class="pcard__skel" style="aspect-ratio:1/1"></div><div></div></div>
    </div>

    <section class="section" data-complementary-wrap style="display:none">
      <h2 class="catalogue-head serif">Complétez avec</h2>
      <div class="pgrid" data-complementary></div>
    </section>

    <section class="section" data-related-wrap style="display:none">
      <h2 class="catalogue-head serif">Vous aimerez aussi</h2>
      <div class="pgrid" data-related></div>
    </section>
  </main>

  <div id="site-footer"></div>

  <script type="module">
    import { initShell, fetchProducts, fetchCollections, fetchPromos, applyPromos, productCard, addToCart, cartQty, euro, priceLabel, escapeHtml, slugify, breadcrumbHTML, loadBrandHandles } from "/shared.js";
    initShell({ active: "Mobilier", transparentNav: false });

    const params = new URLSearchParams(location.search);
    const handle = params.get("handle");
    const id     = params.get("id");
    const host = document.querySelector("[data-pdp]");

    // Prefer ?handle= (unbounded by the /api/products 250-product cap).
    // Falls back to the legacy id lookup so bookmarked ?id= URLs still
    // resolve for products within the cap.
    async function loadProduct() {
      if (handle) {
        const r = await fetch(`/api/product/${encodeURIComponent(handle)}`);
        if (r.status === 404) return null;
        if (!r.ok) throw new Error("HTTP " + r.status);
        return r.json();
      }
      const all = await fetchProducts();
      return all.find((x) => x.id === id || encodeURIComponent(x.id) === id) || null;
    }

    // Slug→label for ?cat= views (mirrors produits.html CAT_LABEL — 7 stable
    // entries). Labels the category crumb on the PDP breadcrumb.
    const CAT_LABEL = { tous: "Le catalogue", assises: "Assises", tables: "Tables", luminaires: "Luminaires", rangements: "Rangements", objets: "Objets", exterieur: "Extérieur" };

    // Build the PDP breadcrumb from the ?from= token — the path the user took
    // to reach this product (set by productCard). Falls back to a neutral
    // "Accueil › Le catalogue › <produit>" when from is absent/unknown; never
    // invents the brand.
    async function buildContextualBreadcrumb(p, brandMap) {
      const crumbEl = document.querySelector("[data-breadcrumb]");
      if (!crumbEl) return;
      const home = { label: "Accueil", href: "/" };
      const last = { label: p.name };
      const from = new URLSearchParams(location.search).get("from") || "";
      const i = from.indexOf(":");
      const type = i === -1 ? from : from.slice(0, i);
      const val  = i === -1 ? "" : from.slice(i + 1);
      let trail;
      if (type === "coll" && val) {
        let title = val;
        try {
          const colls = await fetchCollections();
          const c = (colls || []).find((x) => x.handle === val);
          if (c && c.name) title = c.name;
        } catch (e) { /* keep the handle as label */ }
        trail = [home, { label: title, href: `/collections/${val}` }, last];
      } else if (type === "cat" && val && val !== "tous") {
        trail = [home,
          { label: "Mobilier", href: "/produits.html" },
          { label: CAT_LABEL[val] || val, href: `/produits.html?cat=${encodeURIComponent(val)}` },
          last];
      } else if (type === "designer" && val) {
        let name = val;
        try {
          const r = await fetch("/designers-data.json", { cache: "no-cache" });
          if (r.ok) { const list = (await r.json()).designers || []; name = (list.find((x) => x.slug === val) || {}).name || val; }
        } catch (e) { /* keep the slug */ }
        trail = [home,
          { label: "Designers", href: "/designers.html" },
          { label: name, href: `/produits.html?designer=${encodeURIComponent(val)}` },
          last];
      } else if (type === "brand" && val) {
        const handle = brandMap[val];
        const bhref = handle ? `/collections/${handle}` : `/produits.html?brand=${encodeURIComponent(val)}`;
        trail = [home,
          { label: "Marques", href: "/marques.html" },
          { label: p.brand || val, href: bhref },
          last];
      } else {
        trail = [home, { label: "Le catalogue", href: "/produits.html" }, last];
      }
      crumbEl.innerHTML = breadcrumbHTML(trail);
    }

    Promise.all([loadProduct(), loadBrandHandles()]).then(([p, brandMap]) => {
      if (!p) { host.innerHTML = `<p class="plp-empty">Cette pièce est introuvable. <a href="/produits.html" style="color:var(--accent-ink)">Retour au catalogue</a>.</p>`; return; }
      document.title = `${p.name} · Mikadodeco`;

      // Brand collection URL — curated /collections/<handle> when known (joined
      // via mega-menu-brands.json), else the ?brand= filter fallback.
      const bslug = slugify(p.brand || "");
      const brandHref = brandMap[bslug] ? `/collections/${brandMap[bslug]}` : (bslug ? `/produits.html?brand=${bslug}` : "/produits.html");

      // Fil d'Ariane CONTEXTUEL — reflète le chemin réel d'arrivée (encodé en
      // ?from=<type:valeur> par productCard). Repli neutre si from absent/inconnu
      // — on n'invente jamais la marque.
      buildContextualBreadcrumb(p, brandMap);

      const imgs = (p.images && p.images.length ? p.images : [p.image, p.image2]).filter(Boolean);
      // Thumbnail-strip sources: small-width versions, index-parallel to `imgs`.
      // Falls back to `imgs` when the API didn't supply thumbs[] (older payload).
      const thumbSrcs = (p.thumbs && p.thumbs.length ? p.thumbs : imgs);
      // Responsive-image helpers. shopifyResize URLs carry `width=<n>`; swapping
      // that number yields any size from the same base. Because thumbnails match
      // on the QUERY-STRIPPED base URL, different widths never break the active /
      // variant highlight. widthVariant rewrites the width; srcsetFor builds a
      // density ladder for the main image; MAIN_SIZES tells the browser the
      // displayed width (gallery col ≈ 53% desktop, near-full <=760px single-col).
      // Non-Shopify/local images get no srcset (returned untouched).
      const widthVariant = (url, w) => (url && /[?&]width=\d+/.test(url)) ? url.replace(/([?&]width=)\d+/, `$1${w}`) : url;
      const srcsetFor = (url) => (url && url.includes("cdn.shopify.com") && /[?&]width=\d+/.test(url))
        ? [800, 1280, 2048].map((w) => `${widthVariant(url, w)} ${w}w`).join(", ") : "";
      const MAIN_SIZES = "(max-width: 760px) 92vw, 53vw";
      const variants = Array.isArray(p.variants) ? p.variants : [];
      let current = variants.find((v) => v.id === p.variantId) || variants[0] || { id: p.variantId, price: p.price, image: p.image, title: "", available: true, sku: "", qty: null };

      // Galerie = AMBIANCES uniquement (photos en situation), pas les packshots.
      // Règle donnée : un packshot = un variant.image. Donc ambiances = imgs privé
      // de toutes les variants[].image (normalisation URL sans query, comme
      // syncActiveThumb). L'image PRINCIPALE reste le packshot de la variante
      // (current.image, change via applyVariant) ; le rail/dots/miniatures/showThumb/
      // préchargement ne montrent QUE les ambiances. Si vide → aucun strip.
      const norm = (u) => (u || "").split("?")[0];
      const variantUrls = new Set(variants.map((v) => norm(v.image)).filter(Boolean));
      const ambIdx = imgs.map((_s, i) => i).filter((i) => !variantUrls.has(norm(imgs[i])));
      const ambiances = ambIdx.map((i) => imgs[i]);
      const ambThumbs = ambIdx.map((i) => thumbSrcs[i] || imgs[i]);

      // Walk every variant to collect the option axis NAMES — used only to label
      // the variant drawer/trigger dynamically. The drawer lists a FLAT grid of
      // variants[] (one tile per variant = full combo for multi-axis products),
      // so per-axis value maps are no longer needed.
      const optionNames = [];
      const _seenAxes = new Set();
      for (const v of variants) for (const o of (v.options || [])) {
        if (o?.name && !_seenAxes.has(o.name)) { _seenAxes.add(o.name); optionNames.push(o.name); }
      }
      // Libellé DYNAMIQUE du sélecteur : 1 axe « Couleur » → « Coloris » ; 1 autre
      // axe → le nom de l'axe ; plusieurs axes → « Variantes ».
      const singleAxis = optionNames.length === 1 ? optionNames[0] : "";
      const isColorAxis = /^couleur$/i.test(singleAxis);
      const axisLabel = optionNames.length === 1 ? (isColorAxis ? "Coloris" : singleAxis) : "Variantes";
      const axisLabelLower = optionNames.length === 1 ? (isColorAxis ? "coloris" : singleAxis.toLowerCase()) : "variantes";

      // Image d'une variante (avec repli produit) à la largeur voulue.
      const variantImg = (v, w) => widthVariant((v && v.image) || p.image || imgs[0] || "", w);
      // Dispo HONNÊTE PAR VARIANTE — 3 états sur le VRAI stock (v.qty = quantityAvailable),
      // PAS sur availableForSale (= true partout en oversell inventoryPolicy:CONTINUE).
      //   available===false → "unavailable" · qty>0 → "instock" · sinon → "order".
      // Fallback : si qty revient null (scope Storefront non exposé), qty n'est PAS un
      // nombre → jamais "instock" : on n'affirme aucune dispo non vérifiable.
      const variantState = (v) => {
        if (!v || v.available === false) return "unavailable";
        if (typeof v.qty === "number" && v.qty > 0) return "instock";
        return "order";
      };
      // Badge dot+texte (grille tiroir, aperçu, bloc coloris buy-box) — texte ambre
      // partout ; SEUL le point change : vert --stock (en stock) / ambre --order.
      // En stock → affiche le NOMBRE réel (v.qty = quantityAvailable) : version pleine
      // « Disponible · X en stock » (aperçu + buy-box) ou compacte « Dispo · X » (vignette).
      // « Sur commande »/« Indisponible » : jamais de nombre.
      const availInline = (v, compact) => {
        const s = variantState(v);
        if (s === "instock")     return `<span class="pcard__dot pcard__dot--stock" aria-hidden="true"></span>${compact ? `Dispo · ${v.qty}` : `Disponible · ${v.qty} en stock`}`;
        if (s === "unavailable") return `<span class="pcard__dot pcard__dot--order" aria-hidden="true"></span>Indisponible`;
        return `<span class="pcard__dot pcard__dot--order" aria-hidden="true"></span>Sur commande`;
      };
      // Ligne dispo PRODUIT (.pdp__avail) — reflète la VARIANTE sélectionnée (plus de
      // gating p.inStock produit, qui rendait toute variante « À voir en boutique ») :
      //   en stock → « À voir en boutique » (+ lien Maps) · indispo → « Indisponible »
      //   · sinon → « Sur commande » (delai-long) / « Livraison · leadTimeLabel ».
      const SHOWROOM_MAPS = "https://www.google.com/maps/dir/?api=1&destination=75%20Rue%20du%20Doyenn%C3%A9%2C%201180%20Uccle";
      const availStore = (v) => {
        const s = variantState(v || current);
        if (s === "instock")     return `<span class="pcard__dot pcard__dot--stock" aria-hidden="true"></span><strong>À voir en boutique</strong> · <a href="${SHOWROOM_MAPS}" target="_blank" rel="noopener">75 Rue du Doyenné, Uccle</a>`;
        if (s === "unavailable") return `<span class="pcard__dot pcard__dot--order" aria-hidden="true"></span><strong>Indisponible</strong>`;
        return p.longDelay
          ? `<span class="pcard__dot pcard__dot--order" aria-hidden="true"></span><strong>Sur commande</strong> · délai sur demande`
          : `<span class="pcard__dot pcard__dot--order" aria-hidden="true"></span><strong>Livraison</strong> · ${escapeHtml(p.leadTimeLabel || "3-4 semaines")}`;
      };

      // Tableau Caractéristiques (section sœur, sous la galerie) — n'affiche QUE les
      // lignes renseignées ; majoritairement vide tant que les métafields custom.*
      // ne sont pas remplis côté Shopify (ce n'est PAS un bug). Référence = sku par
      // variante (mis à jour dans applyVariant).
      const specRows = [
        ["Dimensions", p.dimensions], ["Matériaux / Finitions", p.material],
        ["Usage", p.usage], ["Entretien", p.entretien], ["Designer", p.designer],
        ["Année / Édition", p.year], ["Fabrication / Origine", p.origin],
        ["Poids", p.weight], ["Garantie", p.warranty],
      ].filter(([, v]) => v != null && v !== "");
      const hasSku = variants.some((v) => v && v.sku);

      host.innerHTML = `
        <div class="pdp">
          <div class="pdp__gallery">
            <span class="pdp__promo" data-promo hidden></span>
            <div class="pdp__main-wrap">
              <img class="pdp__main" data-main src="${escapeHtml(current.image || imgs[0] || "")}" srcset="${escapeHtml(srcsetFor(current.image || imgs[0] || ""))}" sizes="${MAIN_SIZES}" alt="${escapeHtml(p.name)}" fetchpriority="high" decoding="async" role="button" tabindex="0" aria-label="Agrandir la photo" />
            </div>
            ${ambiances.length ? `<div class="pdp__rail" data-rail>${ambiances.map((_src, i) => `<img class="pdp__rail-img" data-rail-img="${i}" src="${escapeHtml(ambiances[i])}" srcset="${escapeHtml(srcsetFor(ambiances[i]))}" sizes="92vw" alt="${escapeHtml(p.name + " — ambiance " + (i + 1))}" loading="lazy" decoding="async" role="button" tabindex="0" aria-label="${escapeHtml("Agrandir la photo d'ambiance " + (i + 1))}" />`).join("")}</div>` : ""}
            ${ambiances.length > 1 ? `<div class="pdp__dots" data-dots role="group" aria-label="Navigation des photos d'ambiance">${ambiances.map((_s, i) => `<button class="pdp__dot-btn${i === 0 ? " is-active" : ""}" data-dot="${i}" type="button" aria-label="Aller à la photo ${i + 1}"></button>`).join("")}</div>` : ""}
            ${ambiances.length ? `<div class="pdp__amb" data-amb-grid>${ambiances.map((_src, i) => `<img class="pdp__amb-img" data-amb="${i}" src="${escapeHtml(ambiances[i])}" srcset="${escapeHtml(srcsetFor(ambiances[i]))}" sizes="(max-width: 760px) 92vw, 26vw" alt="${escapeHtml(p.name + " — ambiance " + (i + 1))}" loading="lazy" decoding="async" role="button" tabindex="0" aria-label="${escapeHtml("Agrandir la photo d'ambiance " + (i + 1))}" />`).join("")}</div>` : ""}
          </div>
          <div class="pdp__info">
            <a class="pdp__brand" href="${brandHref}">${escapeHtml(p.brand || "")}</a>
            <h1 class="pdp__name">${escapeHtml(p.name)}</h1>
            ${p.designer ? `<span class="pdp__designer" data-designer>${escapeHtml(p.designer)}</span>` : ""}
            <div class="pdp__price" data-price-el>${priceLabel(p)}</div>
            ${variants.length > 1 ? `
            <div class="pdp__variant-pick">
              <span class="label">${escapeHtml(axisLabel)}</span>
              <button class="pdp__variant-bar" type="button" data-vard-open aria-haspopup="dialog">
                <img class="pdp__variant-img" data-coloris-img src="${escapeHtml(variantImg(current, 200))}" alt="" loading="lazy" decoding="async" />
                <span class="pdp__variant-meta">
                  <span class="pdp__variant-name" data-coloris-name>${escapeHtml(current.title || "")}</span>
                  <span class="pdp__variant-avail" data-coloris-avail role="status" aria-live="polite">${availInline(current)}</span>
                </span>
                <span class="pdp__variant-bar-arrow" aria-hidden="true">→</span>
              </button>
            </div>` : ""}
            <div class="pdp__buy">
              <button class="pdp__qty-open" type="button" data-qtyd-open aria-haspopup="dialog">Quantité : <span data-qty-label>1</span> <span aria-hidden="true">▾</span></button>
              <button class="btn btn--blue pdp__cta" data-add>Ajouter au panier</button>
            </div>
            <p class="pdp__cart-status" data-cart-status></p>
            <div class="pdp__reassure">
              <p class="pdp__avail" data-avail role="status" aria-live="polite">${availStore(current)}</p>
              <p class="pdp__contact"><a href="/contact.html">Une question ? Écrivez-nous <span aria-hidden="true">→</span></a></p>
            </div>
          </div>
        </div>
        ${p.description ? `<section class="section pdp-section">
          <h2 class="catalogue-head serif">Description</h2>
          <p class="pdp-desc">${escapeHtml(p.description)}</p>
        </section>` : ""}
        ${(specRows.length || hasSku) ? `<section class="section pdp-section">
          <h2 class="catalogue-head serif">Caractéristiques</h2>
          <dl class="pdp-specs">${specRows.map(([k, v]) => `<div><dt>${escapeHtml(k)}</dt><dd>${escapeHtml(String(v))}</dd></div>`).join("")}${hasSku ? `<div><dt>Référence</dt><dd data-spec-sku>${escapeHtml(current.sku || "—")}</dd></div>` : ""}</dl>
        </section>` : ""}`;

      const main = host.querySelector("[data-main]");
      const priceEl = host.querySelector("[data-price-el]");
      const cta = host.querySelector("[data-add]");
      const status = host.querySelector("[data-cart-status]");
      const qtyLabel = host.querySelector("[data-qty-label]");

      // local "how many to add" (cap 1–10) — séparé de la quantité stockée au panier.
      // Choisie via le tiroir Quantité (.qtyd) ; reflétée dans [data-qty-label].
      let pickQty = 1;
      const setPick = (n) => {
        pickQty = Math.max(1, Math.min(10, parseInt(n) || 1));   // cap 1–10
        if (qtyLabel) qtyLabel.textContent = pickQty;
      };

      const updateStatus = () => {
        const n = cartQty(current.id);
        status.innerHTML = n > 0
          ? `Dans le panier : <strong>${n}</strong> · <a href="/selection.html">Mon panier <span aria-hidden="true">›</span></a>`
          : "";
      };
      updateStatus();
      document.addEventListener("cart:change", updateStatus);

      // Auto-discover any Shopify automatic discount that applies to this
      // variant. We probe with qty=100 — large enough to trigger most tier
      // rules (e.g. "buy 5 get 1 free"). If Shopify returns a discount, we
      // surface its title as a baby-blue badge top-left of the main image.
      const promoEl = host.querySelector("[data-promo]");
      let promoSeq = 0;
      async function probePromo(variantId) {
        if (!variantId || !promoEl) return;
        const mySeq = ++promoSeq;
        try {
          const r = await fetch("/api/cart/preview", {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ items: [{ variantId, qty: 100 }] }),
          });
          if (!r.ok) throw new Error("preview " + r.status);
          const data = await r.json();
          if (mySeq !== promoSeq) return; // a newer probe started (variant change)
          if (data.discounts && data.discounts.length > 0) {
            promoEl.textContent = data.discounts[0].title;
            promoEl.hidden = false;
          } else {
            promoEl.hidden = true;
            promoEl.textContent = "";
          }
        } catch (e) {
          // silent — promo badge is optional decoration
          if (mySeq === promoSeq && promoEl) { promoEl.hidden = true; promoEl.textContent = ""; }
        }
      }
      probePromo(current.id);

      // keep the active thumbnail in sync with whatever the main image shows,
      // whether the change came from a thumbnail click or a variant selection.
      const thumbs = Array.from(host.querySelectorAll("[data-thumb]"));
      const stripQuery = (u) => (u || "").split("?")[0];
      const syncActiveThumb = (src) => {
        const target = stripQuery(src);
        thumbs.forEach((t) => t.classList.toggle("is-active", stripQuery(t.getAttribute("src")) === target));
      };

      // match the initial highlight to the image the main is actually showing
      syncActiveThumb(current.image || imgs[0] || "");

      // gallery thumbnails — clic ET clavier (Entrée/Espace) via le même chemin.
      // Affiche l'AMBIANCE pleine largeur ambiances[index] dans le main (pas le src
      // de la vignette 240px) ; syncActiveThumb matche sur l'URL sans query. La
      // principale repassera au packshot au prochain changement de variante.
      const showThumb = (t) => {
        const i = Number(t.dataset.thumb);
        const full = ambiances[i] || t.src;
        main.src = full;
        main.srcset = srcsetFor(full);
        syncActiveThumb(full);
      };
      thumbs.forEach((t) => {
        t.addEventListener("click", () => showThumb(t));
        t.addEventListener("keydown", (e) => {
          if (e.key === "Enter" || e.key === " ") { e.preventDefault(); showThumb(t); }
        });
      });

      // Précharge les AMBIANCES (à la bonne résolution via srcset) pour un changement
      // de photo instantané — différé pour ne pas gêner le LCP.
      const preloadGallery = () => {
        ambiances.forEach((src) => {
          if (!src) return;
          const im = new Image();
          im.sizes = MAIN_SIZES;
          im.srcset = srcsetFor(src);
          im.src = src;
        });
      };
      if ("requestIdleCallback" in window) requestIdleCallback(preloadGallery, { timeout: 1500 });
      else setTimeout(preloadGallery, 700);

      // Précharge les images de TOUTES les variantes (largeur vignette 160 + aperçu 720)
      // pour que survol ET clic du tiroir soient instantanés — différé (idle), même
      // esprit que preloadGallery. Sans ça, l'aperçu se chargeait au survol (latence).
      const preloadVariants = () => {
        if (variants.length <= 1) return;
        const seen = new Set();
        variants.forEach((v) => {
          const base = (v && v.image) || p.image;
          if (!base) return;
          [variantImg(v, 160), variantImg(v, 720)].forEach((src) => {
            if (!src || seen.has(src)) return;
            seen.add(src);
            const im = new Image();
            im.decoding = "async";
            im.src = src;
          });
        });
      };
      if ("requestIdleCallback" in window) requestIdleCallback(preloadVariants, { timeout: 2500 });
      else setTimeout(preloadVariants, 900);

      // ── Application d'une variante (remplace l'ancien refreshAllVselects) ──
      // Source UNIQUE : à partir d'une variante v, met à jour l'image principale
      // (+ rail mobile + miniature active), le prix EXACT, le statut panier, le
      // badge promo, le bloc variantes de la buy-box, la dispo produit (§1.3) et
      // la référence (sku). Appelée par le tiroir variantes (clic/Tap/Entrée).
      const scrollRailTo = (src) => {
        const railEl = host.querySelector("[data-rail]");
        if (!railEl) return;
        const target = stripQuery(src);
        const list = Array.from(railEl.querySelectorAll("[data-rail-img]"));
        const idx = list.findIndex((im) => stripQuery(im.getAttribute("src")) === target || stripQuery(im.currentSrc) === target);
        if (idx >= 0) list[idx].scrollIntoView({ behavior: "auto", inline: "center", block: "nearest" });
      };
      const applyVariant = (v) => {
        if (!v) return;
        current = v;
        const src = current.image || p.image || imgs[0] || "";
        main.src = src;
        main.srcset = srcsetFor(src);
        syncActiveThumb(src);
        scrollRailTo(src);
        if (current.price != null && !Number.isNaN(current.price)) priceEl.textContent = euro(current.price);
        updateStatus();
        probePromo(current.id);
        const cImg = host.querySelector("[data-coloris-img]");
        if (cImg) { cImg.src = variantImg(current, 200); cImg.alt = current.title || ""; }
        const cName = host.querySelector("[data-coloris-name]");
        if (cName) cName.textContent = current.title || "";
        const cAvail = host.querySelector("[data-coloris-avail]");
        if (cAvail) cAvail.innerHTML = availInline(current);
        const availEl = host.querySelector("[data-avail]");          // dispo PRODUIT reflète la variante sélectionnée (en stock / indispo / sur commande)
        if (availEl) availEl.innerHTML = availStore(current);
        const skuEl = host.querySelector("[data-spec-sku]");          // Référence = sku de la variante
        if (skuEl) skuEl.textContent = current.sku || "—";
        renderQtyList();                                              // dispo par quantité dépend de current.qty
      };

      // ── Lien designer (sous le titre) — progressif & HONNÊTE ──
      // Texte simple par défaut ; promu en lien vers la PLP filtrée UNIQUEMENT si
      // slugify(p.designer) retombe EXACTEMENT sur un slug de /designers-data.json
      // (résolu CLIENT-side via le JSON statique). Sinon on garde le nom sans lien
      // (évite l'écran « Designer introuvable »).
      if (p.designer) {
        (async () => {
          try {
            const slug = slugify(p.designer);
            const r = await fetch("/designers-data.json", { cache: "force-cache" });
            if (!r.ok) return;
            const list = (await r.json()).designers || [];
            if (!list.some((x) => x.slug === slug)) return;
            const el = host.querySelector("[data-designer]");
            if (!el) return;
            const a = document.createElement("a");
            a.className = "pdp__designer pdp__designer--link";
            a.setAttribute("data-designer", "");
            a.href = `/produits.html?designer=${encodeURIComponent(slug)}`;
            a.textContent = p.designer;
            el.replaceWith(a);
          } catch (e) { /* garde le nom en texte simple */ }
        })();
      }

      // ── Galerie mobile (≤760px) : points de navigation du rail swipeable ──
      const railEl = host.querySelector("[data-rail]");
      const dotEls = Array.from(host.querySelectorAll("[data-dot]"));
      if (railEl && dotEls.length) {
        const slides = Array.from(railEl.querySelectorAll("[data-rail-img]"));
        const setActiveDot = (i) => dotEls.forEach((d, di) => d.classList.toggle("is-active", di === i));
        if ("IntersectionObserver" in window) {
          const io = new IntersectionObserver((entries) => {
            entries.forEach((en) => { if (en.isIntersecting) setActiveDot(Number(en.target.dataset.railImg)); });
          }, { root: railEl, threshold: 0.6 });
          slides.forEach((im) => io.observe(im));
        }
        const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
        dotEls.forEach((d) => d.addEventListener("click", () => {
          const i = Number(d.dataset.dot);
          slides[i]?.scrollIntoView({ behavior: reduceMotion ? "auto" : "smooth", inline: "center", block: "nearest" });
          setActiveDot(i);
        }));
      }

      // ── Lightbox plein écran (galerie) ──
      // Voile encre, z-index 130 (au-dessus des tiroirs). Navigation ←/→, Échap,
      // focus-trap + retour focus. Ouverte au clic sur la photo principale (desktop)
      // ou sur une vignette du rail (mobile/tactile).
      document.body.insertAdjacentHTML("beforeend", `
        <div class="pdplb" data-lightbox>
          <div class="pdplb__backdrop" data-lb-backdrop></div>
          <div class="pdplb__stage" role="dialog" aria-modal="true" aria-label="Galerie photos" data-lb-stage>
            <button class="pdplb__close" data-lb-close type="button" aria-label="Fermer">&times;</button>
            ${ambiances.length ? `<button class="pdplb__nav pdplb__nav--prev" data-lb-prev type="button" aria-label="Photo précédente">&lsaquo;</button>` : ""}
            <img class="pdplb__img" data-lb-img alt="" />
            ${ambiances.length ? `<button class="pdplb__nav pdplb__nav--next" data-lb-next type="button" aria-label="Photo suivante">&rsaquo;</button>` : ""}
          </div>
        </div>`);
      const lbRoot = document.querySelector("[data-lightbox]");
      const lbStage = lbRoot.querySelector("[data-lb-stage]");
      const lbImg = lbRoot.querySelector("[data-lb-img]");
      let lbIndex = 0, lbLastFocus = null, lbSeq = [];
      // Séquence lightbox = packshot de la variante courante PUIS les ambiances (le
      // packshot reste zoomable en 1re position). Reconstruite à l'ouverture pour
      // refléter la variante sélectionnée. Dédupliquée par URL (sans query).
      const lbBuild = () => {
        const head = current.image || imgs[0] || "";
        const seen = new Set(); const out = [];
        for (const s of [head, ...ambiances]) {
          if (!s) continue;
          const k = norm(s);
          if (!seen.has(k)) { seen.add(k); out.push(s); }
        }
        return out;
      };
      const lbShow = (i) => {
        if (!lbSeq.length) return;
        lbIndex = (i + lbSeq.length) % lbSeq.length;
        const src = lbSeq[lbIndex];
        lbImg.src = src; lbImg.srcset = srcsetFor(src); lbImg.sizes = "92vw";
        lbImg.alt = `${p.name} — photo ${lbIndex + 1}`;
      };
      function lbClose() {
        lbRoot.classList.remove("open");
        document.body.classList.remove("pdplb-locked");
        document.removeEventListener("keydown", lbKeydown, true);
        if (lbLastFocus && document.contains(lbLastFocus)) lbLastFocus.focus();
      }
      function lbKeydown(e) {
        if (e.key === "Escape") { e.preventDefault(); lbClose(); return; }
        if (e.key === "ArrowRight") { e.preventDefault(); lbShow(lbIndex + 1); return; }
        if (e.key === "ArrowLeft") { e.preventDefault(); lbShow(lbIndex - 1); return; }
        if (e.key !== "Tab") return;
        const f = Array.from(lbStage.querySelectorAll("button")).filter((el) => el.offsetParent !== null && !el.disabled);
        if (!f.length) return;
        const first = f[0], last = f[f.length - 1];
        if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }
        else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }
      }
      const lbOpen = (startSrc) => {
        lbSeq = lbBuild();
        if (!lbSeq.length) return;
        lbLastFocus = document.activeElement;
        const target = norm(startSrc);
        let idx = lbSeq.findIndex((s) => norm(s) === target);
        if (idx < 0) idx = 0;
        lbShow(idx);
        lbRoot.classList.add("open");
        document.body.classList.add("pdplb-locked");
        document.addEventListener("keydown", lbKeydown, true);
        requestAnimationFrame(() => lbRoot.querySelector("[data-lb-close]")?.focus());
      };
      lbRoot.querySelector("[data-lb-backdrop]").addEventListener("click", lbClose);
      lbRoot.querySelector("[data-lb-close]").addEventListener("click", lbClose);
      lbRoot.querySelector("[data-lb-prev]")?.addEventListener("click", () => lbShow(lbIndex - 1));
      lbRoot.querySelector("[data-lb-next]")?.addEventListener("click", () => lbShow(lbIndex + 1));
      main.addEventListener("click", () => lbOpen(main.currentSrc || main.src));
      main.addEventListener("keydown", (e) => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); lbOpen(main.currentSrc || main.src); } });
      if (railEl) {
        const railOpen = (e) => {
          const im = e.target.closest("[data-rail-img]");
          if (im) { e.preventDefault(); lbOpen(im.currentSrc || im.getAttribute("src")); }
        };
        railEl.addEventListener("click", railOpen);
        railEl.addEventListener("keydown", (e) => { if (e.key === "Enter" || e.key === " ") railOpen(e); });
      }
      // Grille d'ambiances (desktop) → lightbox au clic/Entrée (même séquence).
      const ambGrid = host.querySelector("[data-amb-grid]");
      if (ambGrid) {
        const ambOpen = (e) => {
          const im = e.target.closest("[data-amb]");
          if (im) { e.preventDefault(); lbOpen(im.currentSrc || im.getAttribute("src")); }
        };
        ambGrid.addEventListener("click", ambOpen);
        ambGrid.addEventListener("keydown", (e) => { if (e.key === "Enter" || e.key === " ") ambOpen(e); });
      }

      // ── Tiroir de variantes (glisse de la GAUCHE — miroir du tiroir panier) ──
      // Grille PLATE de toutes les variantes (4/ligne), aperçu en haut, dispo par
      // variante. Survol/Focus = aperçu (sans valider) ; clic/Tap/Entrée = applique
      // + ferme. role=listbox/option, focus-trap, Échap, verrou DÉDIÉ vard-locked.
      if (variants.length > 1) {
        document.body.insertAdjacentHTML("beforeend", `
          <div class="vard" data-variant-drawer>
            <div class="vard__backdrop" data-vard-backdrop></div>
            <aside class="vard__panel" role="dialog" aria-modal="true" aria-label="Choisir ${escapeHtml(isColorAxis ? "un coloris" : "une variante")}" data-vard-panel>
              <header class="vard__head">
                <h2 class="vard__title">${escapeHtml(axisLabel)} (${variants.length})</h2>
                <button class="vard__close" data-vard-close type="button" aria-label="Fermer">&times;</button>
              </header>
              <div class="vard__body">
                <img class="vard__preview-img" data-vard-preview-img alt="" />
                <div class="vard__preview-name" data-vard-preview-name></div>
                <div class="vard__preview-avail" data-vard-preview-avail role="status" aria-live="polite"></div>
                <ul class="vard__grid" role="listbox" aria-label="${escapeHtml(axisLabel)} disponibles" data-vard-grid>${variants.map((v) => `
                  <li class="vard__opt${v.id === current.id ? " is-selected" : ""}" role="option" aria-selected="${v.id === current.id}"${v.available === false ? ' aria-disabled="true"' : ""} data-variant-id="${escapeHtml(v.id)}" tabindex="${v.id === current.id ? "0" : "-1"}">
                    <img class="vard__opt-img" src="${escapeHtml(variantImg(v, 160))}" alt="${escapeHtml(v.title || "")}" loading="lazy" decoding="async" />
                    <span class="vard__opt-name">${escapeHtml(v.title || "")}</span>
                    <span class="vard__opt-avail">${availInline(v, true)}</span>
                  </li>`).join("")}</ul>
              </div>
            </aside>
          </div>`);
        const vRoot = document.querySelector("[data-variant-drawer]");
        const vPanel = vRoot.querySelector("[data-vard-panel]");
        const vGrid = vRoot.querySelector("[data-vard-grid]");
        const vById = (id) => variants.find((v) => v.id === id);
        const vOpts = () => Array.from(vGrid.querySelectorAll(".vard__opt"));
        let vLastFocus = null;
        const lockVard = (on) => {
          const sw = window.innerWidth - document.documentElement.clientWidth;
          if (on) { if (sw > 0) document.body.style.paddingRight = sw + "px"; document.body.classList.add("vard-locked"); }
          else { document.body.style.paddingRight = ""; document.body.classList.remove("vard-locked"); }
        };
        const vPreview = (v) => {
          if (!v) return;
          const pi = vRoot.querySelector("[data-vard-preview-img]");
          pi.src = variantImg(v, 720); pi.alt = v.title || "";
          vRoot.querySelector("[data-vard-preview-name]").textContent = v.title || "";
          vRoot.querySelector("[data-vard-preview-avail]").innerHTML = availInline(v);
        };
        function closeVard() {
          vRoot.classList.remove("open");
          lockVard(false);
          document.removeEventListener("keydown", vKeydown, true);
          if (vLastFocus && document.contains(vLastFocus)) vLastFocus.focus();
          else host.querySelector("[data-vard-open]")?.focus();
        }
        function vKeydown(e) {
          if (e.key === "Escape") { e.preventDefault(); closeVard(); return; }
          if (e.key !== "Tab") return;
          const f = Array.from(vPanel.querySelectorAll('button, [href], input, [tabindex]:not([tabindex="-1"])')).filter((el) => el.offsetParent !== null && !el.disabled);
          if (!f.length) return;
          const first = f[0], last = f[f.length - 1];
          if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }
          else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }
        }
        const openVard = () => {
          vLastFocus = document.activeElement;
          document.querySelector("[data-cart-drawer]")?.classList.remove("open"); // exclusivité tiroirs : ferme panier + quantité
          document.querySelector("[data-qty-drawer]")?.classList.remove("open");
          vOpts().forEach((o) => {
            const sel = o.dataset.variantId === current.id;
            o.setAttribute("aria-selected", sel ? "true" : "false");
            o.classList.toggle("is-selected", sel);
            o.tabIndex = sel ? 0 : -1;
          });
          vPreview(current);
          vRoot.classList.add("open");
          lockVard(true);
          document.addEventListener("keydown", vKeydown, true);
          requestAnimationFrame(() => vRoot.querySelector("[data-vard-close]")?.focus());
        };
        const focusOpt = (t) => {
          if (!t) return;
          vOpts().forEach((o) => (o.tabIndex = -1));
          t.tabIndex = 0; t.focus(); vPreview(vById(t.dataset.variantId));
        };
        const COLS = 4;
        const moveFocus = (from, delta) => {
          const opts = vOpts();
          let i = opts.indexOf(from); if (i < 0) i = 0;
          focusOpt(opts[Math.max(0, Math.min(opts.length - 1, i + delta))]);
        };
        host.querySelector("[data-vard-open]")?.addEventListener("click", openVard);
        vRoot.querySelector("[data-vard-backdrop]").addEventListener("click", closeVard);
        vRoot.querySelector("[data-vard-close]").addEventListener("click", closeVard);
        vGrid.addEventListener("mouseover", (e) => { const o = e.target.closest(".vard__opt"); if (o) vPreview(vById(o.dataset.variantId)); });
        vGrid.addEventListener("focusin", (e) => { const o = e.target.closest(".vard__opt"); if (o) vPreview(vById(o.dataset.variantId)); });
        vGrid.addEventListener("click", (e) => {
          const o = e.target.closest(".vard__opt"); if (!o) return;
          applyVariant(vById(o.dataset.variantId)); closeVard();
        });
        vGrid.addEventListener("keydown", (e) => {
          const o = e.target.closest(".vard__opt"); if (!o) return;
          switch (e.key) {
            case "ArrowRight": e.preventDefault(); moveFocus(o, 1); break;
            case "ArrowLeft":  e.preventDefault(); moveFocus(o, -1); break;
            case "ArrowDown":  e.preventDefault(); moveFocus(o, COLS); break;
            case "ArrowUp":    e.preventDefault(); moveFocus(o, -COLS); break;
            case "Home":       e.preventDefault(); focusOpt(vOpts()[0]); break;
            case "End":        e.preventDefault(); { const a = vOpts(); focusOpt(a[a.length - 1]); } break;
            case "Enter":
            case " ":          e.preventDefault(); applyVariant(vById(o.dataset.variantId)); closeVard(); break;
          }
        });
      }

      // ── Tiroir QUANTITÉ (glisse de la DROITE — calqué sur .vard) ──
      // Liste 1→10 avec dispo PAR QUANTITÉ : n ≤ current.qty (vrai stock) → point
      // vert « En stock » ; sinon (ou qty null/0) → point ambre « Sur commande ».
      // Clic → fixe pickQty (cap 1–10) + ferme. Verrou dédié qtyd-locked ; ferme les
      // autres tiroirs à l'ouverture. role=listbox, focus-trap, Échap.
      document.body.insertAdjacentHTML("beforeend", `
        <div class="qtyd" data-qty-drawer>
          <div class="qtyd__backdrop" data-qtyd-backdrop></div>
          <aside class="qtyd__panel" role="dialog" aria-modal="true" aria-label="Choisir la quantité" data-qtyd-panel>
            <header class="qtyd__head">
              <h2 class="qtyd__title">Quantité</h2>
              <button class="qtyd__close" data-qtyd-close type="button" aria-label="Fermer">&times;</button>
            </header>
            <div class="qtyd__body">
              <ul class="qtyd__list" role="listbox" aria-label="Quantité" data-qtyd-list></ul>
            </div>
          </aside>
        </div>`);
      const QTY_MAX = 10;
      const qRoot = document.querySelector("[data-qty-drawer]");
      const qPanel = qRoot.querySelector("[data-qtyd-panel]");
      const qList = qRoot.querySelector("[data-qtyd-list]");
      let qLastFocus = null;
      const lockQtyd = (on) => {
        const sw = window.innerWidth - document.documentElement.clientWidth;
        if (on) { if (sw > 0) document.body.style.paddingRight = sw + "px"; document.body.classList.add("qtyd-locked"); }
        else { document.body.style.paddingRight = ""; document.body.classList.remove("qtyd-locked"); }
      };
      // (Re)construit la liste 1→10 selon current.qty. qty null → traité comme 0
      // (jamais « En stock » — cohérent avec la dispo honnête).
      function renderQtyList() {
        const stock = (typeof current.qty === "number") ? current.qty : 0;
        qList.innerHTML = Array.from({ length: QTY_MAX }, (_x, k) => {
          const n = k + 1;
          const ok = n <= stock;
          return `<li class="qtyd__opt${n === pickQty ? " is-selected" : ""}" role="option" aria-selected="${n === pickQty}" data-qty="${n}" tabindex="${n === pickQty ? "0" : "-1"}">
            <span class="qtyd__num">${n}</span>
            <span class="qtyd__state"><span class="pcard__dot ${ok ? "pcard__dot--stock" : "pcard__dot--order"}" aria-hidden="true"></span>${ok ? "En stock" : "Sur commande"}</span>
          </li>`;
        }).join("");
      }
      const qOpts = () => Array.from(qList.querySelectorAll(".qtyd__opt"));
      function closeQtyd() {
        qRoot.classList.remove("open");
        lockQtyd(false);
        document.removeEventListener("keydown", qKeydown, true);
        if (qLastFocus && document.contains(qLastFocus)) qLastFocus.focus();
        else host.querySelector("[data-qtyd-open]")?.focus();
      }
      function qKeydown(e) {
        if (e.key === "Escape") { e.preventDefault(); closeQtyd(); return; }
        if (e.key !== "Tab") return;
        const f = Array.from(qPanel.querySelectorAll('button, [href], [tabindex]:not([tabindex="-1"])')).filter((el) => el.offsetParent !== null && !el.disabled);
        if (!f.length) return;
        const first = f[0], last = f[f.length - 1];
        if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }
        else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }
      }
      const openQtyd = () => {
        qLastFocus = document.activeElement;
        document.querySelector("[data-cart-drawer]")?.classList.remove("open");      // exclusivité tiroirs
        document.querySelector("[data-variant-drawer]")?.classList.remove("open");
        renderQtyList();
        qRoot.classList.add("open");
        lockQtyd(true);
        document.addEventListener("keydown", qKeydown, true);
        requestAnimationFrame(() => (qList.querySelector('.qtyd__opt[tabindex="0"]') || qRoot.querySelector("[data-qtyd-close]"))?.focus());
      };
      const qFocus = (t) => { if (!t) return; qOpts().forEach((o) => (o.tabIndex = -1)); t.tabIndex = 0; t.focus(); };
      const qMove = (from, delta) => {
        const a = qOpts(); let i = a.indexOf(from); if (i < 0) i = 0;
        qFocus(a[Math.max(0, Math.min(a.length - 1, i + delta))]);
      };
      const pickFromRow = (row) => { if (!row) return; setPick(Number(row.dataset.qty)); closeQtyd(); };
      host.querySelector("[data-qtyd-open]")?.addEventListener("click", openQtyd);
      qRoot.querySelector("[data-qtyd-backdrop]").addEventListener("click", closeQtyd);
      qRoot.querySelector("[data-qtyd-close]").addEventListener("click", closeQtyd);
      qList.addEventListener("click", (e) => { const o = e.target.closest(".qtyd__opt"); if (o) pickFromRow(o); });
      qList.addEventListener("keydown", (e) => {
        const o = e.target.closest(".qtyd__opt"); if (!o) return;
        switch (e.key) {
          case "ArrowDown": e.preventDefault(); qMove(o, 1); break;
          case "ArrowUp":   e.preventDefault(); qMove(o, -1); break;
          case "Home":      e.preventDefault(); qFocus(qOpts()[0]); break;
          case "End":       e.preventDefault(); { const a = qOpts(); qFocus(a[a.length - 1]); } break;
          case "Enter":
          case " ":         e.preventDefault(); pickFromRow(o); break;
        }
      });
      renderQtyList();   // init

      // add the chosen quantity of the current variant to the selection
      cta.addEventListener("click", () => {
        addToCart({
          handle: p.id,
          variantId: current.id,
          name: p.name + (current.title && variants.length > 1 ? ` · ${current.title}` : ""),
          brand: p.brand,
          price: current.price || 0,
          image: current.image || p.image,
        }, pickQty);
      });

      // Recommandations produit — pilotées par les métafields Search & Discovery
      // de Shopify (complementary_products / related_products), lues dynamiquement
      // via /api/product/:handle. RIEN n'est hardcodé : les relations vivent côté
      // Shopify et s'enrichissent en continu. Chaque bloc reste masqué si sa liste
      // est vide. productCard() produit des liens /produit.html?handle= (DA).
      const renderRecos = (items, wrapSel, gridSel) => {
        const list = Array.isArray(items) ? items.filter((x) => x && x.image) : [];
        if (!list.length) return;
        document.querySelector(wrapSel).style.display = "";
        document.querySelector(gridSel).innerHTML = list.map(productCard).join("");
      };
      renderRecos(p.complementary, "[data-complementary-wrap]", "[data-complementary]");
      renderRecos(p.related, "[data-related-wrap]", "[data-related]");

      // Inject promo badges on the main PDP (non-default variants via probePromo
      // above) and on the reco cards via the shared generic-discount map.
      fetchPromos().then(applyPromos).catch((e) => console.warn("[v3] promos unavailable:", e.message));
    }).catch((e) => { host.innerHTML = `<p class="plp-empty">La pièce se charge bientôt.</p>`; console.warn(e); });
  </script>
</body>
</html>
