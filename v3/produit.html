<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Produit · Mikadodeco</title>
  <link rel="preconnect" href="https://use.typekit.net" />
  <link rel="preconnect" href="https://p.typekit.net" crossorigin />
  <link rel="stylesheet" href="https://use.typekit.net/gqc3ska.css" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div id="site-header"></div>

  <main class="page wrap">
    <div data-breadcrumb></div>
    <div data-promo-slot></div>
    <div data-pdp>
      <div class="pdp"><div class="pcard__skel" style="aspect-ratio:1/1"></div><div></div></div>
    </div>

    <section class="section" data-related-wrap style="display:none">
      <h2 class="catalogue-head serif">Dans le même esprit</h2>
      <div class="pgrid" data-related></div>
    </section>
  </main>

  <div id="site-footer"></div>

  <script type="module">
    import { initShell, fetchProducts, fetchCollections, fetchPromos, applyPromos, productCard, addToCart, cartQty, euro, priceLabel, escapeHtml, slugify, isPromoEteActive, promoBandeauHTML, breadcrumbHTML, loadBrandHandles, PROMO_ETE_2026 } from "/shared.js";
    initShell({ active: "Mobilier", transparentNav: false });

    const params = new URLSearchParams(location.search);
    const handle = params.get("handle");
    const id     = params.get("id");
    const host = document.querySelector("[data-pdp]");

    // The full catalogue is needed by at most two places on this page: the
    // ?id= fallback below and the "related" block. Share ONE /api/products
    // promise so we never fetch the (up to 250-product) list twice.
    let _allProducts;
    const allProducts = () => (_allProducts ??= fetchProducts());

    // Prefer ?handle= (unbounded by the /api/products 250-product cap).
    // Falls back to the legacy id lookup so bookmarked ?id= URLs still
    // resolve for products within the cap.
    async function loadProduct() {
      if (handle) {
        const r = await fetch(`/api/product/${encodeURIComponent(handle)}`);
        if (r.status === 404) return null;
        if (!r.ok) throw new Error("HTTP " + r.status);
        return r.json();
      }
      const all = await allProducts();
      return all.find((x) => x.id === id || encodeURIComponent(x.id) === id) || null;
    }

    // Slug→label for ?cat= views (mirrors produits.html CAT_LABEL — 7 stable
    // entries). Labels the category crumb on the PDP breadcrumb.
    const CAT_LABEL = { tous: "Le catalogue", assises: "Assises", tables: "Tables", luminaires: "Luminaires", rangements: "Rangements", objets: "Objets", exterieur: "Extérieur" };

    // Build the PDP breadcrumb from the ?from= token — the path the user took
    // to reach this product (set by productCard). Falls back to a neutral
    // "Accueil › Le catalogue › <produit>" when from is absent/unknown; never
    // invents the brand.
    async function buildContextualBreadcrumb(p, brandMap) {
      const crumbEl = document.querySelector("[data-breadcrumb]");
      if (!crumbEl) return;
      const home = { label: "Accueil", href: "/" };
      const last = { label: p.name };
      const from = new URLSearchParams(location.search).get("from") || "";
      const i = from.indexOf(":");
      const type = i === -1 ? from : from.slice(0, i);
      const val  = i === -1 ? "" : from.slice(i + 1);
      let trail;
      if (type === "coll" && val) {
        let title = val;
        try {
          const colls = await fetchCollections();
          const c = (colls || []).find((x) => x.handle === val);
          if (c && c.name) title = c.name;
        } catch (e) { /* keep the handle as label */ }
        trail = [home, { label: title, href: `/collections/${val}` }, last];
      } else if (type === "cat" && val && val !== "tous") {
        trail = [home,
          { label: "Mobilier", href: "/produits.html" },
          { label: CAT_LABEL[val] || val, href: `/produits.html?cat=${encodeURIComponent(val)}` },
          last];
      } else if (type === "designer" && val) {
        let name = val;
        try {
          const r = await fetch("/designers-data.json", { cache: "force-cache" });
          if (r.ok) { const list = (await r.json()).designers || []; name = (list.find((x) => x.slug === val) || {}).name || val; }
        } catch (e) { /* keep the slug */ }
        trail = [home,
          { label: "Designers", href: "/designers.html" },
          { label: name, href: `/produits.html?designer=${encodeURIComponent(val)}` },
          last];
      } else if (type === "brand" && val) {
        const handle = brandMap[val];
        const bhref = handle ? `/collections/${handle}` : `/produits.html?brand=${encodeURIComponent(val)}`;
        trail = [home,
          { label: "Marques", href: "/marques.html" },
          { label: p.brand || val, href: bhref },
          last];
      } else {
        trail = [home, { label: "Le catalogue", href: "/produits.html" }, last];
      }
      crumbEl.innerHTML = breadcrumbHTML(trail);
    }

    Promise.all([loadProduct(), loadBrandHandles()]).then(([p, brandMap]) => {
      if (!p) { host.innerHTML = `<p class="plp-empty">Cette pièce est introuvable. <a href="/produits.html" style="color:var(--accent-ink)">Retour au catalogue</a>.</p>`; return; }
      document.title = `${p.name} · Mikadodeco`;

      // Brand collection URL — curated /collections/<handle> when known (joined
      // via mega-menu-brands.json), else the ?brand= filter fallback.
      const bslug = slugify(p.brand || "");
      const brandHref = brandMap[bslug] ? `/collections/${brandMap[bslug]}` : (bslug ? `/produits.html?brand=${bslug}` : "/produits.html");

      // Fil d'Ariane CONTEXTUEL — reflète le chemin réel d'arrivée (encodé en
      // ?from=<type:valeur> par productCard). Repli neutre si from absent/inconnu
      // — on n'invente jamais la marque.
      buildContextualBreadcrumb(p, brandMap);

      // Promo bandeau on PDPs for products tagged as eligible to the BXGY
      // discount (89 sieges). Auto-hides outside the active window.
      const promoSlot = document.querySelector("[data-promo-slot]");
      if (promoSlot && isPromoEteActive() && Array.isArray(p.tags) && p.tags.includes(PROMO_ETE_2026.tagSiege)) {
        promoSlot.innerHTML = promoBandeauHTML("pdp");
      }

      const imgs = (p.images && p.images.length ? p.images : [p.image, p.image2]).filter(Boolean);
      const metaRows = [
        ["Designer", p.designer], ["Année", p.year], ["Matière", p.material],
        ["Dimensions", p.dimensions], ["Délai", p.leadTime],
      ].filter(([, v]) => v);

      const variants = Array.isArray(p.variants) ? p.variants : [];
      let current = variants.find((v) => v.id === p.variantId) || variants[0] || { id: p.variantId, price: p.price, image: p.image, title: "", available: true };

      // Walk every variant to collect the option axes (Couleur, Structure,
      // Coussin, etc.) and the distinct values per axis. Products like the
      // Fauteuil cabriolet 1900 have 2 axes (Structure × Coussin) and need
      // one dropdown each — single-axis products keep one dropdown.
      const optionNames = [];
      const optionValues = {};
      const _seenAxes = new Set();
      for (const v of variants) for (const o of (v.options || [])) {
        if (!o?.name) continue;
        if (!_seenAxes.has(o.name)) { _seenAxes.add(o.name); optionNames.push(o.name); optionValues[o.name] = []; }
        if (!optionValues[o.name].includes(o.value)) optionValues[o.name].push(o.value);
      }
      // Currently selected value per axis (mirrors the `current` variant).
      const currentSelection = {};
      for (const o of (current.options || [])) currentSelection[o.name] = o.value;

      // Variant lookup helpers used by the dropdowns.
      const findVariantBy = (sel) =>
        variants.find((v) => (v.options || []).every((o) => sel[o.name] === o.value));
      const imageForOption = (axisName, axisValue) => {
        const sel = { ...currentSelection, [axisName]: axisValue };
        const exact = findVariantBy(sel);
        if (exact?.image) return exact.image;
        const any = variants.find((v) => (v.options || []).some((o) => o.name === axisName && o.value === axisValue));
        return any?.image || p.image || "";
      };

      host.innerHTML = `
        <div class="pdp">
          <div class="pdp__gallery">
            <div class="pdp__main-wrap">
              <span class="pdp__promo" data-promo hidden></span>
              <img class="pdp__main" data-main src="${escapeHtml(current.image || imgs[0] || "")}" alt="${escapeHtml(p.name)}" />
            </div>
            ${imgs.length > 1 ? `<div class="pdp__thumbs">${imgs.map((src, i) => `<img data-thumb="${i}" class="${i === 0 ? "is-active" : ""}" src="${escapeHtml(src)}" alt="" />`).join("")}</div>` : ""}
          </div>
          <div class="pdp__info">
            <a class="pdp__brand" href="${brandHref}">${escapeHtml(p.brand || "")}</a>
            <h1 class="pdp__name">${escapeHtml(p.name)}</h1>
            ${p.designer ? `<div class="pdp__designer">Dessiné par ${escapeHtml(p.designer)}</div>` : ""}
            <div class="pdp__price" data-price-el>${priceLabel(p)}</div>
            ${variants.length > 1 && optionNames.length > 0 ? optionNames.map((axisName) => {
              const selVal = currentSelection[axisName] || "";
              return `
            <div class="pdp__variants">
              <span class="label">${escapeHtml(axisName)}</span>
              <div class="vselect" data-vselect data-option-name="${escapeHtml(axisName)}">
                <button class="vselect__toggle" type="button" data-vselect-toggle aria-expanded="false" aria-haspopup="listbox">
                  <img class="vselect__thumb" data-vselect-current-img src="${escapeHtml(imageForOption(axisName, selVal))}" alt="" />
                  <span class="vselect__value" data-vselect-current-label>${escapeHtml(selVal || 'Choisir')}</span>
                  <svg class="vselect__chevron" viewBox="0 0 24 24" aria-hidden="true"><path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="1.6" fill="none"/></svg>
                </button>
                <ul class="vselect__list" data-vselect-list role="listbox" hidden>
                  ${optionValues[axisName].map((val) => `<li class="vselect__option${val === selVal ? ' is-active' : ''}" data-option-value="${escapeHtml(val)}" role="option" aria-selected="${val === selVal}">
                    <img class="vselect__thumb" src="${escapeHtml(imageForOption(axisName, val))}" alt="" loading="lazy" />
                    <span>${escapeHtml(val)}</span>
                  </li>`).join('')}
                </ul>
              </div>
            </div>`;
            }).join('') : ""}
            <div class="pdp__qty">
              <span class="label">Quantité</span>
              <div class="qty">
                <button class="qty__btn" data-qty-dec aria-label="Diminuer la quantité" type="button">−</button>
                <input class="qty__val" data-qty-input type="text" inputmode="numeric" value="1" aria-label="Quantité" />
                <button class="qty__btn" data-qty-inc aria-label="Augmenter la quantité" type="button">+</button>
              </div>
            </div>
            <button class="btn btn--blue btn--block pdp__cta" data-add>+ Ajouter à la sélection</button>
            <p class="pdp__cart-status" data-cart-status></p>
            <p class="pdp__avail">${p.inStock
              ? `<span class="pcard__dot pcard__dot--stock" aria-hidden="true"></span><strong>À voir en boutique</strong> · 75 Rue du Doyenné, Uccle`
              : p.longDelay
                ? `<span class="pcard__dot pcard__dot--order" aria-hidden="true"></span><strong>Sur commande</strong> · délai sur demande`
                : `<span class="pcard__dot pcard__dot--order" aria-hidden="true"></span><strong>Livraison</strong> · ${escapeHtml(p.leadTimeLabel || "3-4 semaines")}`}</p>
            <p class="pdp__note">Visible aussi en boutique à Uccle. <a href="/rendez-vous.html">Voir en boutique</a>.</p>
            ${p.description ? `<p class="pdp__desc">${escapeHtml(p.description)}</p>` : ""}
            ${metaRows.length ? `<dl class="pdp__meta">${metaRows.map(([k, v]) => `<div><dt>${k}</dt><dd>${escapeHtml(v)}</dd></div>`).join("")}</dl>` : ""}
          </div>
        </div>`;

      const main = host.querySelector("[data-main]");
      const priceEl = host.querySelector("[data-price-el]");
      const cta = host.querySelector("[data-add]");
      const status = host.querySelector("[data-cart-status]");
      const qtyInput = host.querySelector("[data-qty-input]");

      // local "how many to add" — separate from the cart's stored quantity
      let pickQty = 1;
      const setPick = (n) => {
        pickQty = Math.max(1, Math.min(99, parseInt(n) || 1));
        qtyInput.value = pickQty;
      };
      host.querySelector("[data-qty-dec]").addEventListener("click", () => setPick(pickQty - 1));
      host.querySelector("[data-qty-inc]").addEventListener("click", () => setPick(pickQty + 1));
      qtyInput.addEventListener("change", (e) => setPick(e.target.value));

      const updateStatus = () => {
        const n = cartQty(current.id);
        status.innerHTML = n > 0
          ? `Dans la sélection : <strong>${n}</strong> · <a href="/selection.html">Ma sélection</a>`
          : "";
      };
      updateStatus();
      document.addEventListener("cart:change", updateStatus);

      // Auto-discover any Shopify automatic discount that applies to this
      // variant. We probe with qty=100 — large enough to trigger most tier
      // rules (e.g. "buy 5 get 1 free"). If Shopify returns a discount, we
      // surface its title as a baby-blue badge top-left of the main image.
      const promoEl = host.querySelector("[data-promo]");
      let promoSeq = 0;
      async function probePromo(variantId) {
        if (!variantId || !promoEl) return;
        const mySeq = ++promoSeq;
        try {
          const r = await fetch("/api/cart/preview", {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ items: [{ variantId, qty: 100 }] }),
          });
          if (!r.ok) throw new Error("preview " + r.status);
          const data = await r.json();
          if (mySeq !== promoSeq) return; // a newer probe started (variant change)
          if (data.discounts && data.discounts.length > 0) {
            promoEl.textContent = data.discounts[0].title;
            promoEl.hidden = false;
          } else {
            promoEl.hidden = true;
            promoEl.textContent = "";
          }
        } catch (e) {
          // silent — promo badge is optional decoration
          if (mySeq === promoSeq && promoEl) { promoEl.hidden = true; promoEl.textContent = ""; }
        }
      }
      probePromo(current.id);

      // keep the active thumbnail in sync with whatever the main image shows,
      // whether the change came from a thumbnail click or a variant selection.
      const thumbs = Array.from(host.querySelectorAll("[data-thumb]"));
      const stripQuery = (u) => (u || "").split("?")[0];
      const syncActiveThumb = (src) => {
        const target = stripQuery(src);
        thumbs.forEach((t) => t.classList.toggle("is-active", stripQuery(t.getAttribute("src")) === target));
      };

      // match the initial highlight to the image the main is actually showing
      syncActiveThumb(current.image || imgs[0] || "");

      // gallery thumbnails
      thumbs.forEach((t) => t.addEventListener("click", () => {
        main.src = t.src;
        syncActiveThumb(t.getAttribute("src"));
      }));

      // Refresh every dropdown's toggle + active option + main image / price
      // / status / promo to reflect `currentSelection` and `current`. Called
      // after any axis change.
      const closeAllVselects = () => host.querySelectorAll("[data-vselect]").forEach((vs) => {
        vs.querySelector("[data-vselect-toggle]")?.setAttribute("aria-expanded", "false");
        const lst = vs.querySelector("[data-vselect-list]");
        if (lst) lst.hidden = true;
      });

      const refreshAllVselects = () => {
        host.querySelectorAll("[data-vselect]").forEach((vs) => {
          const axis = vs.dataset.optionName;
          const sel = currentSelection[axis];
          const tImg = vs.querySelector("[data-vselect-current-img]");
          const tLab = vs.querySelector("[data-vselect-current-label]");
          if (tImg) tImg.src = imageForOption(axis, sel);
          if (tLab) tLab.textContent = sel || "Choisir";
          vs.querySelectorAll(".vselect__option").forEach((opt) => {
            const v = opt.dataset.optionValue;
            opt.classList.toggle("is-active", v === sel);
            opt.setAttribute("aria-selected", v === sel ? "true" : "false");
            const thumb = opt.querySelector(".vselect__thumb");
            if (thumb) thumb.src = imageForOption(axis, v);
          });
        });
        closeAllVselects();
        if (current.image) { main.src = current.image; syncActiveThumb(current.image); }
        priceEl.textContent = euro(current.price);
        updateStatus();
        probePromo(current.id);
      };

      // Option click: update currentSelection on that axis, resolve the new
      // variant (exact match preferred, else adopt the closest combination).
      host.querySelectorAll(".vselect__option").forEach((opt) => opt.addEventListener("click", () => {
        const vs = opt.closest("[data-vselect]");
        const axis = vs?.dataset.optionName;
        const value = opt.dataset.optionValue;
        if (!axis || !value) return;
        currentSelection[axis] = value;
        let v = findVariantBy(currentSelection);
        if (!v) {
          // Combination doesn't exist — fall back to any variant matching
          // the just-picked option, then sync currentSelection to its axes.
          v = variants.find((x) => (x.options || []).some((o) => o.name === axis && o.value === value));
          if (v) for (const o of (v.options || [])) currentSelection[o.name] = o.value;
        }
        if (!v) return;
        current = v;
        refreshAllVselects();
      }));

      // Per-toggle open/close — only one dropdown open at a time.
      host.querySelectorAll("[data-vselect-toggle]").forEach((toggle) => {
        toggle.addEventListener("click", (e) => {
          e.stopPropagation();
          const vs = toggle.closest("[data-vselect]");
          const list = vs.querySelector("[data-vselect-list]");
          const open = toggle.getAttribute("aria-expanded") === "true";
          closeAllVselects();
          if (!open) {
            toggle.setAttribute("aria-expanded", "true");
            list.hidden = false;
          }
        });
      });
      document.addEventListener("click", (e) => {
        if (!e.target.closest("[data-vselect]")) closeAllVselects();
      });
      document.addEventListener("keydown", (e) => { if (e.key === "Escape") closeAllVselects(); });

      // add the chosen quantity of the current variant to the selection
      cta.addEventListener("click", () => {
        addToCart({
          handle: p.id,
          variantId: current.id,
          name: p.name + (current.title && variants.length > 1 ? ` · ${current.title}` : ""),
          brand: p.brand,
          price: current.price || 0,
          image: current.image || p.image,
        }, pickQty);
      });

      // related (same category) — best-effort, fetched separately so the
      // PDP renders even if the product list is unavailable or capped.
      allProducts().then((all) => {
        const related = all.filter((x) => x.category === p.category && x.id !== p.id && x.image).slice(0, 4);
        if (related.length) {
          document.querySelector("[data-related-wrap]").style.display = "";
          document.querySelector("[data-related]").innerHTML = related.map(productCard).join("");
        }
      }).catch((e) => console.warn("[pdp] related unavailable:", e.message));

      // Inject promo badges (both on the main PDP for non-default variants via
      // probePromo above, and on the related cards via the shared map).
      fetchPromos().then(applyPromos).catch((e) => console.warn("[v3] promos unavailable:", e.message));
    }).catch((e) => { host.innerHTML = `<p class="plp-empty">La pièce se charge bientôt.</p>`; console.warn(e); });
  </script>
</body>
</html>
