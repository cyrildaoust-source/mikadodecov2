<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Votre sélection · Mikadodeco</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://use.typekit.net/gqc3ska.css" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div id="site-header"></div>

  <main class="page wrap">
    <div class="pagehead"><span class="eyebrow">Panier</span><h1 class="serif">Votre sélection</h1></div>

    <div data-populated style="display:none">
      <div class="sel">
        <div data-items></div>
        <aside class="sel-summary">
          <h2 class="serif">Récapitulatif</h2>
          <div class="sel-row"><span>Sous-total</span><span data-subtotal>…</span></div>
          <div class="sel-discounts" data-discounts hidden></div>
          <div class="sel-row"><span>Livraison</span><span data-delivery-fee>Offerte</span></div>
          <div class="sel-row sel-row--total"><span data-total-label>Total</span><span data-total>…</span></div>
          <p class="sel-eta" data-cart-eta hidden></p>

          <div class="sel-opt">
            <h3>Livraison</h3>
            <label><input type="radio" name="delivery" value="showroom" checked /> <span>Retrait au showroom, Uccle <em>(offerte)</em></span></label>
            <label><input type="radio" name="delivery" value="standard" /> <span>Livraison Belgique <em data-delivery-belgium-label>(50 €)</em></span></label>
            <p class="sel-opt__hint" data-delivery-hint>Livraison offerte dès 1 000 € d'achats.</p>
          </div>
          <button class="btn btn--solid btn--block" data-checkout style="margin-top:14px">Finaliser la sélection</button>
          <p class="form-error" data-checkout-error style="display:none;margin-top:10px"></p>
        </aside>
      </div>
    </div>

    <div class="sel-empty" data-empty style="display:none">
      <h2 class="serif">Votre sélection est vide</h2>
      <p style="color:var(--muted);margin-bottom:24px">Parcourez le catalogue et ajoutez les pièces qui vous parlent.</p>
      <a href="/produits.html" class="btn btn--outline">Voir le catalogue</a>
    </div>
  </main>

  <div id="site-footer"></div>

  <script type="module">
    import { initShell, readCart, removeFromCartAt, setCartQty, fetchProducts, euro, escapeHtml } from "/shared.js";
    initShell({ active: "", transparentNav: false });

    const SHIPPING_FREE_FROM = 1000;       // free shipping threshold (€, post-discount)
    const SHIPPING_BELGIUM   = 50;          // standard Belgium fee
    function deliveryFee(method, payable) {
      if (method === "showroom") return 0;
      if (method === "standard") return payable >= SHIPPING_FREE_FROM ? 0 : SHIPPING_BELGIUM;
      return 0;
    }
    function deliveryLabel(method, payable) {
      if (method === "showroom") return "Retrait showroom Uccle (offerte)";
      if (method === "standard") return payable >= SHIPPING_FREE_FROM ? "Livraison Belgique (offerte)" : `Livraison Belgique (${SHIPPING_BELGIUM}€)`;
      return "";
    }
    const populated = document.querySelector("[data-populated]");
    const empty = document.querySelector("[data-empty]");
    const itemsEl = document.querySelector("[data-items]");

    function delivery() { return document.querySelector('input[name="delivery"]:checked')?.value || "showroom"; }

    // Last preview returned by /api/cart/preview. When present, its values
    // (post-discount subtotal + discount breakdown) replace the local sums.
    let lastPreview = null;
    const discountsEl = document.querySelector("[data-discounts]");

    // Map of variantId → { longDelay }. Populated once /api/products
    // resolves. Used by the cart-wide ETA.
    let variantInfo = new Map();
    fetchProducts().then((all) => {
      for (const p of all) {
        for (const v of (p.variants || [])) {
          variantInfo.set(v.id, { longDelay: !!p.longDelay });
        }
      }
      render();
    }).catch((e) => console.warn("[selection] product info unavailable:", e.message));

    function render() {
      const cart = readCart();
      if (!cart.length) { populated.style.display = "none"; empty.style.display = "block"; return; }
      populated.style.display = "block"; empty.style.display = "none";
      itemsEl.innerHTML = cart.map((i, idx) => {
        const qty = i.qty || 1;
        const lineSubtotal = (i.price || 0) * qty;
        const lineDiscount = lastPreview?.lineDiscounts?.[i.variantId] || 0;
        return `
        <div class="sel-item" data-row="${idx}">
          <img class="sel-item__img" src="${escapeHtml(i.image)}" alt="${escapeHtml(i.name)}" />
          <div>
            <div class="sel-item__brand">${escapeHtml(i.brand || "")}</div>
            <div class="sel-item__name">${escapeHtml(i.name || "")}</div>
            <div class="sel-item__controls">
              <div class="qty qty--sm">
                <button class="qty__btn" data-qty-dec="${escapeHtml(i.variantId)}" aria-label="Diminuer" type="button">−</button>
                <input class="qty__val" data-qty-input="${escapeHtml(i.variantId)}" type="text" inputmode="numeric" value="${qty}" aria-label="Quantité" />
                <button class="qty__btn" data-qty-inc="${escapeHtml(i.variantId)}" aria-label="Augmenter" type="button">+</button>
              </div>
              <button class="sel-item__remove" data-remove="${idx}">Retirer</button>
            </div>
          </div>
          <div class="sel-item__price">${euro(lineSubtotal)}${lineDiscount > 0 ? `<span class="sel-item__discount">−${euro(lineDiscount)}</span>` : ""}</div>
        </div>`;
      }).join("");

      const localSubtotal = cart.reduce((s, i) => s + (i.price || 0) * (i.qty || 1), 0);
      const subtotal = localSubtotal;                  // displayed as "Sous-total" (pre-discount)
      const discount = lastPreview?.discount || 0;     // sum of all Shopify discounts
      const payable  = Math.max(0, subtotal - discount);
      const fee      = deliveryFee(delivery(), payable);
      const grand    = payable + fee;

      // Standard-delivery sub-label updates between "(50 €)" and "(offerte)"
      // based on the threshold, and the small hint below explains how close
      // the customer is to free shipping.
      const belgLabel = document.querySelector("[data-delivery-belgium-label]");
      if (belgLabel) belgLabel.textContent = payable >= SHIPPING_FREE_FROM ? "(offerte)" : `(${SHIPPING_BELGIUM} €)`;
      const hint = document.querySelector("[data-delivery-hint]");
      if (hint) {
        if (payable >= SHIPPING_FREE_FROM) {
          hint.textContent = "Livraison Belgique offerte sur votre panier.";
          hint.classList.add("is-met");
        } else {
          const missing = SHIPPING_FREE_FROM - payable;
          hint.textContent = `Plus que ${euro(missing)} pour la livraison offerte.`;
          hint.classList.remove("is-met");
        }
      }

      document.querySelector("[data-subtotal]").textContent = euro(subtotal);
      document.querySelector("[data-delivery-fee]").textContent = fee ? euro(fee) : "Offerte";

      // Discount lines (visible only when Shopify returned at least one)
      const list = lastPreview?.discounts || [];
      if (list.length > 0) {
        discountsEl.innerHTML = list.map((d) => `<div class="sel-row sel-row--discount"><span>Remise · ${escapeHtml(d.title)}</span><span>−${euro(d.amount)}</span></div>`).join("");
        discountsEl.hidden = false;
      } else {
        discountsEl.innerHTML = "";
        discountsEl.hidden = true;
      }

      document.querySelector("[data-total-label]").textContent = "Total";
      document.querySelector("[data-total]").textContent = euro(grand);

      // Cart-wide ETA. Uniform 3-4 semaines unless any item is tagged as a
      // long-delay exception (Fermob peak / Kriptonite / sur-mesure…), in
      // which case we tell the customer we'll confirm by mail/phone.
      const etaEl = document.querySelector("[data-cart-eta]");
      if (etaEl) {
        const anyLong = cart.some((i) => variantInfo.get(i.variantId)?.longDelay);
        if (anyLong) {
          etaEl.innerHTML = `<strong>Délai sur demande</strong> · certains articles de votre sélection peuvent demander un délai plus long. Nous vous contacterons après votre commande pour confirmer.`;
          etaEl.classList.add("sel-eta--warn");
        } else {
          etaEl.innerHTML = `Livraison estimée : <strong>3-4 semaines</strong>`;
          etaEl.classList.remove("sel-eta--warn");
        }
        etaEl.hidden = false;
      }

      // NOTE: per the promo brief (docs/promo-ete-2026/brief_frontend.md
      // §4) we don't nudge the cart toward a 4th chair. A 3-chair order is
      // higher margin and we don't want to actively push for the free 4th.
      // Shopify renders its own "réduction appliquée" line at checkout when
      // the BXGY threshold is crossed — that's enough.
    }

    // Debounced preview fetch: asks Shopify for the *real* totals + automatic
    // discount allocations (e.g. "Buy 5 get 1 free") for the current cart.
    let previewTimer = null;
    let previewSeq = 0;
    function schedulePreview() {
      clearTimeout(previewTimer);
      previewTimer = setTimeout(async () => {
        const cart = readCart();
        if (!cart.length) { lastPreview = null; render(); return; }
        const mySeq = ++previewSeq;
        try {
          const res = await fetch("/api/cart/preview", {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ items: cart.map((i) => ({ variantId: i.variantId, qty: i.qty || 1 })) }),
          });
          if (!res.ok) throw new Error("preview " + res.status);
          const data = await res.json();
          if (mySeq !== previewSeq) return; // a newer request already started
          lastPreview = data;
          render();
        } catch (e) {
          // silent failure: keep the local (pre-discount) totals
          if (mySeq === previewSeq) { lastPreview = null; render(); }
          console.warn("[selection] preview unavailable:", e.message);
        }
      }, 500);
    }

    function findQty(variantId) {
      const item = readCart().find((i) => i.variantId === variantId);
      return item ? (item.qty || 1) : 0;
    }

    document.addEventListener("click", (e) => {
      const rm = e.target.closest("[data-remove]");
      if (rm) { removeFromCartAt(Number(rm.dataset.remove)); return; }
      const dec = e.target.closest("[data-qty-dec]");
      if (dec) {
        const v = dec.dataset.qtyDec;
        const n = findQty(v);
        if (n > 1) setCartQty(v, n - 1);
        return;
      }
      const inc = e.target.closest("[data-qty-inc]");
      if (inc) {
        const v = inc.dataset.qtyInc;
        const n = findQty(v);
        setCartQty(v, Math.min(99, n + 1));
        return;
      }
    });
    document.addEventListener("change", (e) => {
      if (e.target.name === "delivery") render();
      const qtyEl = e.target.closest("[data-qty-input]");
      if (qtyEl) {
        const v = qtyEl.dataset.qtyInput;
        const n = Math.max(1, Math.min(99, parseInt(qtyEl.value) || 1));
        setCartQty(v, n);
      }
    });

    document.querySelector("[data-checkout]").addEventListener("click", async () => {
      const cart = readCart();
      if (!cart.length) return;
      const btn = document.querySelector("[data-checkout]");
      const err = document.querySelector("[data-checkout-error]");
      btn.disabled = true; btn.textContent = "Redirection…"; err.style.display = "none";
      try {
        const localSubtotal = cart.reduce((s, i) => s + (i.price || 0) * (i.qty || 1), 0);
        const payable = Math.max(0, localSubtotal - (lastPreview?.discount || 0));
        const projet = `Livraison: ${deliveryLabel(delivery(), payable)}`;
        const res = await fetch("/api/cart/create", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ items: cart.map((i) => ({ variantId: i.variantId, qty: i.qty || 1 })), customer: { projet } }),
        });
        const data = await res.json();
        if (data.checkoutUrl) location.href = data.checkoutUrl;
        else throw new Error(data.error || "checkout");
      } catch (e2) {
        err.textContent = "Le paiement n'a pas pu démarrer. Réessayez ou contactez-nous."; err.style.display = "block";
        btn.disabled = false; btn.textContent = "Finaliser la sélection";
        console.warn(e2);
      }
    });

    document.addEventListener("cart:change", () => { render(); schedulePreview(); });

    // Back-button safety: if the user hits "back" from Shopify checkout the
    // page restores from the bfcache with the button still disabled / showing
    // "Redirection…". Reset to its idle state on every pageshow.
    window.addEventListener("pageshow", () => {
      const btn = document.querySelector("[data-checkout]");
      if (btn) { btn.disabled = false; btn.textContent = "Finaliser la sélection"; }
      const err = document.querySelector("[data-checkout-error]");
      if (err) { err.style.display = "none"; err.textContent = ""; }
    });

    render();
    schedulePreview();
  </script>
</body>
</html>
